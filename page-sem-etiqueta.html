<div id="page-sem-etiqueta" class="page">

  <!-- Header interno -->
  <header class="page-header">
    <button class="back-btn" id="backFromSemEtiqueta" aria-label="Voltar para Home">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Home
    </button>
    <div>
      <div class="page-title">Sem Etiqueta</div>
      <div class="page-subtitle">Produtos com indisponibilidade de etiqueta</div>
    </div>
    <div class="page-header-right">
      <button class="icon-btn theme-btn" aria-label="Alternar tema" title="Alternar tema (Ctrl+D)">
        <svg class="theme-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn shortcuts-btn" aria-label="Atalhos de teclado" title="Atalhos (?)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="page-content">
    <div class="main-card">

      <!-- Busca + toolbar -->
      <div class="search-area" style="padding: 20px 24px 16px;">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            class="search-box" id="se-search"
            type="search"
            placeholder="Buscar produto…"
            autocomplete="off" autocorrect="off" spellcheck="false"
            aria-label="Buscar produto sem etiqueta"
          >
        </div>
      </div>

      <!-- Toolbar count + refresh -->
      <div class="results-area" style="padding: 0 24px 24px;">
        <div class="toolbar visible" id="se-toolbar" style="max-height:60px;opacity:1;margin-bottom:14px;margin-top:14px;">
          <div class="toolbar-left">
            <span class="loading" id="se-loading">
              <span class="spinner"></span> Carregando…
            </span>
            <span class="result-count" id="se-count"></span>
          </div>
          <div class="toolbar-right">
            <button class="small-btn" id="se-refresh" title="Atualizar lista">
              <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.25"/></svg>
              <span>Atualizar</span>
            </button>
          </div>
        </div>

        <!-- Conteúdo (skeleton e resultados) -->
        <div id="se-content"></div>
      </div>

    </div>
  </div>

</div>
