<div id="page-validade" class="page">

  <!-- Header interno -->
  <header class="page-header">
    <button class="back-btn" id="backFromValidade" aria-label="Voltar para Home">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Home
    </button>
    <div>
      <div class="page-title">Validade</div>
      <div class="page-subtitle">Controle de prazos e vencimentos</div>
    </div>
    <div class="page-header-right">
      <button class="icon-btn theme-btn" aria-label="Alternar tema" title="Alternar tema (Ctrl+D)">
        <svg class="theme-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn shortcuts-btn" aria-label="Atalhos de teclado" title="Atalhos (?)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="page-content">

    <!-- Summary cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-value" id="val-total">—</div>
        <div class="summary-label">Total de produtos</div>
      </div>
      <div class="summary-card attention">
        <div class="summary-value" id="val-atencao">—</div>
        <div class="summary-label">Atenção (≤90 dias)</div>
      </div>
      <div class="summary-card critical">
        <div class="summary-value" id="val-critico">—</div>
        <div class="summary-label">Crítico / Vencido</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filtros-bar">
      <input
        type="search"
        id="val-search"
        placeholder="Buscar produto…"
        autocomplete="off"
      >
      <select id="val-sort">
        <option value="nearest">Validade (mais próxima)</option>
        <option value="farthest">Validade (mais distante)</option>
        <option value="name">Produto A–Z</option>
        <option value="days">Dias restantes</option>
      </select>
      <select id="val-filter">
        <option value="all">Todos os status</option>
        <option value="ok">OK</option>
        <option value="atencao">Atenção</option>
        <option value="critico">Crítico</option>
        <option value="vencido">Vencido</option>
      </select>
      <button class="refresh-btn" id="val-refresh">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.25"/>
        </svg>
        Atualizar
      </button>
      <button class="small-btn" id="val-toggle-inativo" title="Ocultar/mostrar vencidos">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
        <span id="val-toggle-inativo-lbl">Ocultar Vencidos</span>
      </button>
      <button class="small-btn" id="val-email-btn" title="Enviar relatório de produtos críticos por e-mail">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Relatório E-mail
      </button>
    </div>

    <div class="val-count-bar" id="val-count-bar"></div>

    <!-- Skeleton loader -->
    <div id="val-skel" style="display:none" class="skel-list">
      <div class="skel-item shimmer"></div>
      <div class="skel-item shimmer"></div>
      <div class="skel-item shimmer"></div>
    </div>

    <!-- Grid de cards de validade -->
    <div id="val-results" class="val-grid"></div>

  </div>
</div>
