<div id="page-validade" class="page">
  <div class="val-page">

    <!-- Summary cards -->
    <div class="val-summary">
      <div class="val-summary-card">
        <div class="val-sum-icon total">
          <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        </div>
        <div>
          <div class="val-sum-num" id="valSumTotal">—</div>
          <div class="val-sum-lbl">Total de produtos</div>
        </div>
      </div>
      <div class="val-summary-card">
        <div class="val-sum-icon atencao">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>
          <div class="val-sum-num" id="valSumAtencao">—</div>
          <div class="val-sum-lbl">Atenção (0–90 dias)</div>
        </div>
      </div>
      <div class="val-summary-card">
        <div class="val-sum-icon critico">
          <svg viewBox="0 0 24 24"><polygon points="12 2 22 20 2 20"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div>
          <div class="val-sum-num" id="valSumCritico">—</div>
          <div class="val-sum-lbl">Crítico / Vencido</div>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="val-filters">
      <input
        class="val-filter-input" id="valFilterInput"
        type="search"
        placeholder="Filtrar por nome de produto…"
        autocomplete="off"
      >
      <select class="val-select" id="valSortSelect">
        <option value="nearest">Validade mais próxima</option>
        <option value="farthest">Validade mais distante</option>
        <option value="name">Produto A–Z</option>
        <option value="days">Dias restantes</option>
      </select>
      <select class="val-select" id="valStatusSelect">
        <option value="all">Todos os status</option>
        <option value="ok">OK</option>
        <option value="atencao">Atenção</option>
        <option value="critico">Crítico</option>
        <option value="vencido">Vencido</option>
      </select>
      <button class="val-refresh-btn" id="valRefreshBtn">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.25"/></svg>
        Atualizar
      </button>
    </div>

    <div class="val-count-bar" id="valCountBar"></div>

    <!-- Skeleton loader -->
    <div id="valLoading">
      <div class="skeleton-list">
        <div class="skeleton-item"><div class="skel-icon shimmer"></div><div class="skel-body"><div class="skel-line shimmer" style="width:65%"></div><div class="skel-line short shimmer"></div></div></div>
        <div class="skeleton-item"><div class="skel-icon shimmer"></div><div class="skel-body"><div class="skel-line shimmer" style="width:50%"></div><div class="skel-line short shimmer"></div></div></div>
        <div class="skeleton-item"><div class="skel-icon shimmer"></div><div class="skel-body"><div class="skel-line shimmer" style="width:72%"></div><div class="skel-line short shimmer"></div></div></div>
      </div>
    </div>

    <div id="valError" style="display:none"></div>
    <div class="val-grid" id="valGrid" style="display:none"></div>

  </div>
</div>
