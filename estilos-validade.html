<style>
/* ═══════════════════════════════════════════════════
   VALIDADE — LAYOUT
   ═══════════════════════════════════════════════════ */
.summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.summary-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 18px 20px;
  backdrop-filter: blur(10px); box-shadow: var(--shadow-sm);
}
.summary-value { font-size: 28px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; }
.summary-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.summary-card.attention .summary-value { color: var(--warning); }
.summary-card.critical  .summary-value { color: var(--danger); }

.filtros-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
.filtros-bar input, .filtros-bar select {
  height: 38px; border: 1.5px solid var(--input-border); border-radius: var(--radius-sm);
  background: var(--surface-solid); color: var(--text-primary); font-size: 13px;
  padding: 0 12px; outline: none; font-family: var(--font); transition: border-color 0.2s, box-shadow 0.2s;
}
.filtros-bar input { flex: 1; min-width: 200px; }
.filtros-bar input:focus, .filtros-bar select:focus {
  border-color: var(--green-500); box-shadow: 0 0 0 2px var(--green-glow);
}
.refresh-btn {
  display: flex; align-items: center; gap: 6px; height: 38px; padding: 0 16px;
  border-radius: var(--radius-sm); border: 1.5px solid var(--border);
  background: var(--surface-solid); color: var(--text-secondary); font-size: 13px;
  cursor: pointer; transition: all var(--tr-fast); font-family: var(--font);
}
.refresh-btn:hover { border-color: var(--green-border); color: var(--green-700); background: var(--green-100); }
.refresh-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.val-count-bar { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.val-count-bar strong { color: var(--text-primary); }

.val-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

.val-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 16px 18px;
  transition: border-color .17s, box-shadow .17s, transform .17s;
  animation: slideIn .26s ease both;
}
.val-card:hover { border-color: var(--item-hover-border); box-shadow: 0 6px 22px var(--item-hover-shadow); transform: translateY(-2px); }
.val-card.danger  { border-left: 3px solid var(--danger); }
.val-card.warning { border-left: 3px solid var(--warning); }
.val-card.caution { border-left: 3px solid #fdd835; }
.val-card.ok      { border-left: 3px solid var(--green-400); }

.val-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.val-prod-name { font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; line-height: 1.3; }
.val-dias-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 8px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.dias-ok      { background: var(--ok-bg); color: var(--ok-color); }
.dias-caution { background: #fff8e1; color: #f57f17; }
.dias-warn    { background: var(--warning-bg); color: var(--warning); }
.dias-crit    { background: var(--danger-bg); color: var(--danger); }
[data-theme="dark"] .dias-caution { background: rgba(253,216,53,.1); }
.val-date     { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.val-lote-eta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.val-badges   { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.val-obs { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--divider); }

.val-card.fading-out { animation: fadeOut 0.4s ease forwards; pointer-events: none; }

@media (max-width: 640px) {
  .summary-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .summary-card { padding: 10px 8px; }
  .summary-value { font-size: 22px; }
  .summary-label { font-size: 10px; }
  .filtros-bar { flex-direction: column; gap: 8px; }
  .filtros-bar input, .filtros-bar select { width: 100%; font-size: 16px; }
  .val-grid { grid-template-columns: 1fr; }
}
</style>
