<style>
/* ═══════════════════════════════════════════════
   CSS TOKENS — light / dark
   ═══════════════════════════════════════════════ */
:root {
  --bg:                  #eef0f3;
  --surface:             rgba(255,255,255,0.88);
  --surface-solid:       #ffffff;
  --border:              rgba(0,0,0,0.08);
  --text-primary:        #1a1a1a;
  --text-secondary:      #555;
  --text-muted:          #aaa;
  --input-bg:            #f5f6f8;
  --input-border:        #e0e0e0;
  --input-focus-border:  #43a047;
  --input-focus-shadow:  rgba(67,160,71,0.14);
  --item-bg:             #f9fafb;
  --item-border:         #ebebeb;
  --item-hover-border:   #a5d6a7;
  --item-hover-shadow:   rgba(46,125,50,0.14);
  --chip-bg:             #f1f8f1;
  --chip-border:         #c8e6c9;
  --badge-bg:            #f1f8f1;
  --badge-color:         #388e3c;
  --mark-bg:             #fff59d;
  --mark-color:          inherit;
  --scrollbar-thumb:     #c8e6c9;
  --scrollbar-track:     transparent;
  --kbd-bg:              rgba(255,255,255,0.85);
  --kbd-border:          #d0d0d0;
  --toggle-bg:           #ededf0;
  --toggle-color:        #555;
  --divider:             #f0f0f0;
  --shadow-card:         0 2px 4px rgba(0,0,0,0.06),0 8px 28px rgba(0,0,0,0.10);
  --shadow-sidebar:      4px 0 24px rgba(0,0,0,0.08);
  --green-deep:          #1b5e20;
  --green-mid:           #2e7d32;
  --green-base:          #43a047;
  --green-light:         #66bb6a;
  --green-pale:          #a5d6a7;
  --danger:              #c62828;
  --danger-bg:           #ffebee;
  --warning:             #e65100;
  --warning-bg:          #fff3e0;
  --ok-bg:               #f1f8f1;
  --ok-color:            #2e7d32;
  --sidebar-width:       280px;
}
[data-theme="dark"] {
  --bg:                  #0d1117;
  --surface:             rgba(22,27,34,0.95);
  --surface-solid:       #161b22;
  --border:              rgba(255,255,255,0.08);
  --text-primary:        #e6edf3;
  --text-secondary:      #8b949e;
  --text-muted:          #484f58;
  --input-bg:            #161b22;
  --input-border:        #30363d;
  --input-focus-border:  #66bb6a;
  --input-focus-shadow:  rgba(102,187,106,0.18);
  --item-bg:             #161b22;
  --item-border:         #21262d;
  --item-hover-border:   #66bb6a;
  --item-hover-shadow:   rgba(102,187,106,0.16);
  --chip-bg:             #1a2e1c;
  --chip-border:         #2d4830;
  --badge-bg:            #1a2e1c;
  --badge-color:         #81c784;
  --mark-bg:             rgba(255,245,0,0.22);
  --mark-color:          #fff59d;
  --scrollbar-thumb:     #30363d;
  --scrollbar-track:     transparent;
  --kbd-bg:              rgba(255,255,255,0.07);
  --kbd-border:          #3a5a3c;
  --toggle-bg:           #21262d;
  --toggle-color:        #8b949e;
  --divider:             #21262d;
  --shadow-card:         0 2px 4px rgba(0,0,0,0.35),0 8px 28px rgba(0,0,0,0.45);
  --shadow-sidebar:      4px 0 24px rgba(0,0,0,0.35);
  --green-deep:          #1b5e20;
  --green-mid:           #2e7d32;
  --green-base:          #43a047;
  --green-light:         #66bb6a;
  --green-pale:          #388e3c;
  --danger:              #ef5350;
  --danger-bg:           #1c1010;
  --warning:             #ffa726;
  --warning-bg:          #1c1500;
  --ok-bg:               #1a2e1c;
  --ok-color:            #81c784;
}
html[data-hc="1"] { --text-primary:#000!important;--text-secondary:#111!important;--text-muted:#333!important;--item-border:#444!important;--border:#444!important; }
html[data-hc="1"][data-theme="dark"] { --text-primary:#fff!important;--text-secondary:#eee!important;--text-muted:#bbb!important;--item-border:#66bb6a!important; }

/* ═══════ RESET ═══════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--scrollbar-track);}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--green-pale);}
*{scrollbar-width:thin;scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track);}

body {
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ═══════ ORBS ═══════ */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat linear infinite;}
.orb-1{width:480px;height:480px;background:radial-gradient(circle,#43a047 0%,#1b5e20 60%,transparent 100%);top:-120px;left:-100px;animation-duration:18s;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#1565c0 0%,#0d47a1 60%,transparent 100%);top:40%;right:-120px;animation-duration:22s;animation-delay:-7s;}
.orb-3{width:360px;height:360px;background:radial-gradient(circle,#c2185b 0%,#880e4f 60%,transparent 100%);bottom:-80px;left:30%;animation-duration:26s;animation-delay:-13s;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}25%{transform:translate(40px,-30px) scale(1.06);}50%{transform:translate(-20px,50px) scale(0.94);}75%{transform:translate(30px,20px) scale(1.03);}100%{transform:translate(0,0) scale(1);}}

/* ═══════ SIDEBAR ═══════ */
.sidebar {
  position:fixed;top:0;left:0;
  width:var(--sidebar-width);height:100vh;
  background:var(--surface);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-right:1px solid var(--border);
  box-shadow:var(--shadow-sidebar);
  z-index:200;display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.sb-header{padding:20px 20px 16px;border-bottom:1px solid var(--divider);flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:12px;}
.sb-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#2e7d32,#43a047);border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(46,125,50,.4);flex-shrink:0;}
.sb-logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sb-app-name{font-size:14px;font-weight:700;color:var(--text-primary);}
.sb-version{font-size:10px;color:var(--text-muted);margin-top:1px;}
.sb-section{padding:14px 12px 8px;}
.sb-section-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;padding:0 8px;}
.sb-nav{display:flex;flex-direction:column;gap:2px;}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:none;border:none;cursor:pointer;
  color:var(--text-secondary);font-size:13px;font-weight:500;
  width:100%;text-align:left;
  transition:background .15s,color .15s;
  border-left:3px solid transparent;
}
.sb-item:hover:not(:disabled){background:var(--item-bg);color:var(--text-primary);}
.sb-item.active{background:rgba(46,125,50,.10);color:var(--green-mid);font-weight:700;border-left-color:var(--green-base);}
[data-theme="dark"] .sb-item.active{background:rgba(67,160,71,.12);color:var(--green-light);}
.sb-item-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sb-item-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sb-item-label{flex:1;}
.sb-item--soon{opacity:.4;cursor:not-allowed;}
.sb-soon-badge{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;background:var(--toggle-bg);color:var(--text-muted);border-radius:4px;padding:2px 5px;}
.sb-divider{height:1px;background:var(--divider);margin:4px 12px;}
.sb-tools{border-top:1px solid var(--divider);flex-shrink:0;padding:12px 12px 8px;}
.sb-tool-btn{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:13px;width:100%;text-align:left;transition:background .15s,color .15s;}
.sb-tool-btn:hover{background:var(--item-bg);color:var(--text-primary);}
.sb-tool-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.sb-footer{margin-top:auto;padding:12px 20px;border-top:1px solid var(--divider);font-size:10px;color:var(--text-muted);flex-shrink:0;}

/* ═══════ SIDEBAR OVERLAY ═══════ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;opacity:0;pointer-events:none;transition:opacity .28s ease;}
.sidebar-overlay.open{opacity:1;pointer-events:auto;}

/* ═══════ MAIN WRAPPER ═══════ */
.main-wrapper{margin-left:var(--sidebar-width);min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}

/* ═══════ MAIN HEADER ═══════ */
.main-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 24px;gap:12px;
  background:var(--surface);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.mh-left{display:flex;align-items:center;gap:10px;min-width:0;}
.mh-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.hamburger-btn{display:none;background:var(--toggle-bg);border:none;cursor:pointer;color:var(--toggle-color);width:36px;height:36px;border-radius:10px;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .2s;}
.hamburger-btn:hover{transform:scale(1.08);}
.hamburger-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.mh-breadcrumb{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-muted);}
.mh-bread-sep svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.4;}
.mh-bread-current{font-weight:600;color:var(--text-primary);}
.mh-greeting{font-size:13px;color:var(--text-muted);padding-left:10px;border-left:1px solid var(--border);white-space:nowrap;}
.session-stats{display:none;align-items:center;background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text-muted);white-space:nowrap;}
.session-stats.visible{display:flex;}
.icon-btn{background:var(--toggle-bg);border:none;cursor:pointer;color:var(--toggle-color);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s,transform .2s;position:relative;}
.icon-btn:hover{transform:scale(1.08);}
.icon-btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ═══════ MAIN CONTENT ═══════ */
.main-content{flex:1;padding:24px 24px 80px;}

/* ═══════ PÁGINAS — show/hide ═══════ */
.page{display:none;}
.page.active{display:block;animation:fadeIn 200ms ease both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ═══════ CARD ═══════ */
.card{background:var(--surface);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:22px;border:1px solid var(--border);box-shadow:var(--shadow-card);overflow:hidden;transition:background .3s,border-color .3s;}

/* ═══════ INVENTÁRIO — HERO ═══════ */
.hero{height:72px;background:linear-gradient(105deg,#1b5e20 0%,#2e7d32 38%,#388e3c 68%,#43a047 100%);position:relative;overflow:hidden;}
.hero-pattern{position:absolute;inset:0;width:100%;height:100%;opacity:.15;}
.hero-content{position:absolute;inset:0;display:flex;align-items:center;padding:0 28px;gap:12px;}
.hero-icon{width:20px;height:20px;stroke:rgba(255,255,255,.88);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.hero-text{color:rgba(255,255,255,.92);flex:1;}
.hero-title{font-size:14px;font-weight:700;}
.hero-sub{font-size:11px;opacity:.72;margin-top:1px;}
.hero-sub strong{font-weight:700;}
.header-icon-wrap{position:relative;flex-shrink:0;}
.header-icon{width:40px;height:40px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.header-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.header-icon.spin-once{animation:spinOnce .5s ease;}
@keyframes spinOnce{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.result-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:9px;padding:0 4px;background:var(--green-base);color:#fff;font-size:10px;font-weight:800;line-height:18px;text-align:center;opacity:0;transform:scale(0);transition:opacity .2s,transform .2s;pointer-events:none;}
.result-badge.visible{opacity:1;transform:scale(1);}

/* ═══════ INVENTÁRIO — SEARCH ═══════ */
.search-area{padding:22px 26px;border-bottom:1px solid var(--divider);}
.search-wrapper{position:relative;}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;pointer-events:none;color:var(--text-muted);}
.search-icon.pulsing{animation:pulseIcon .7s ease infinite;}
@keyframes pulseIcon{0%,100%{transform:translateY(-50%) scale(1);opacity:1;}50%{transform:translateY(-50%) scale(1.3);opacity:.5;}}
.search-box{width:100%;height:54px;padding:0 48px;font-size:16px;border-radius:14px;border:1.5px solid var(--input-border);outline:none;background:var(--input-bg);color:var(--text-primary);transition:border-color .22s,box-shadow .22s,background .22s;}
.search-box::placeholder{color:var(--text-muted);}
.search-box:focus{background:var(--surface-solid);border-color:var(--input-focus-border);box-shadow:0 0 0 4px var(--input-focus-shadow);}
.ghost-suggestion{position:absolute;left:48px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;color:var(--text-muted);opacity:.5;white-space:nowrap;overflow:hidden;}
.clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--input-border);border:none;cursor:pointer;color:var(--text-muted);width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;transition:background .15s;}
.clear-btn:hover{background:var(--item-hover-border);color:#fff;}
.clear-btn.visible{display:flex;}
.ghost-hint{font-size:11px;color:var(--text-muted);padding:5px 4px 0;min-height:18px;}
.ghost-hint .ghost-tab{display:inline-block;background:var(--toggle-bg);border-radius:4px;padding:0 5px;font-size:10px;font-weight:700;margin-right:3px;}
.term-pills-wrap{overflow:hidden;max-height:0;opacity:0;transition:max-height .25s ease,opacity .25s ease;margin-top:0;}
.term-pills-wrap.open{max-height:80px;opacity:1;margin-top:10px;}
.term-pills-inner{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.term-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(21,101,192,.12);color:#1565c0;border:1px solid rgba(21,101,192,.25);}
[data-theme="dark"] .term-pill{background:rgba(100,149,237,.15);color:#90caf9;border-color:rgba(100,149,237,.3);}
.term-pill-x{background:none;border:none;cursor:pointer;color:inherit;opacity:.6;display:flex;align-items:center;padding:0;}
.term-pill-x:hover{opacity:1;}
.recents-wrap{margin-top:14px;}
.recents-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.recents-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);}
.recents{display:flex;flex-wrap:wrap;gap:6px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:20px;padding:4px 6px 4px 9px;font-size:11.5px;color:var(--green-mid);cursor:pointer;transition:background .15s,border-color .15s;}
.chip:hover{background:var(--item-bg);border-color:var(--item-hover-border);}
.chip-text{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip-remove{background:none;border:none;cursor:pointer;color:var(--chip-border);padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;width:16px;height:16px;transition:color .15s;flex-shrink:0;}
.chip-remove:hover{color:var(--green-mid);}
.clear-all-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-muted);padding:2px 7px;border-radius:5px;transition:color .15s;}
.clear-all-btn:hover{color:var(--green-mid);}

/* ═══════ INVENTÁRIO — RESULTS ═══════ */
.results-area{padding:0 26px 26px;}
.toolbar{display:flex;align-items:center;justify-content:space-between;overflow:hidden;max-height:0;opacity:0;margin-bottom:0;transition:max-height .22s,opacity .22s,margin-bottom .22s;flex-wrap:wrap;gap:6px;}
.toolbar.visible{max-height:60px;opacity:1;margin-bottom:14px;margin-top:18px;}
.toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.toolbar-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.result-count{font-size:12px;color:var(--text-muted);}
.result-count strong{color:var(--green-light);font-weight:600;}
.cache-badge{display:inline-flex;align-items:center;background:rgba(102,187,106,.18);color:var(--green-light);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;margin-left:4px;}
.resp-time{font-size:10.5px;color:var(--text-muted);}
.loading{display:none;align-items:center;gap:7px;font-size:12px;color:var(--text-muted);}
.loading.visible{display:flex;}
.spinner{width:12px;height:12px;border:2px solid var(--input-border);border-top-color:var(--green-light);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.view-toggles{display:flex;gap:3px;}
.view-btn{background:var(--toggle-bg);border:none;cursor:pointer;color:var(--text-muted);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.view-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.view-btn.active{background:var(--green-mid);color:#fff;}
.small-btn{display:flex;align-items:center;gap:4px;background:var(--toggle-bg);border:none;cursor:pointer;color:var(--text-muted);font-size:11px;font-weight:500;padding:0 9px;height:30px;border-radius:8px;white-space:nowrap;transition:background .15s,color .15s;}
.small-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.small-btn:hover{background:var(--chip-bg);color:var(--green-mid);}
.toolbar-sort{padding:4px 8px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text-secondary);font-size:11px;outline:none;cursor:pointer;height:30px;transition:border-color .2s;}
.toolbar-sort:focus{border-color:var(--input-focus-border);}

/* ═══════ SKELETON ═══════ */
.skeleton-list{display:grid;gap:8px;}
.skeleton-item{padding:13px 16px;border-radius:13px;background:var(--item-bg);border:1.5px solid var(--item-border);display:flex;align-items:center;gap:12px;}
.skel-icon{width:38px;height:38px;border-radius:10px;background:var(--divider);flex-shrink:0;overflow:hidden;}
.skel-body{flex:1;display:flex;flex-direction:column;gap:7px;}
.skel-line{height:12px;border-radius:6px;background:var(--divider);overflow:hidden;}
.skel-line.short{width:40%;}
.shimmer{position:relative;overflow:hidden;}
.shimmer::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.4) 50%,transparent 100%);animation:shimmer 1.4s ease infinite;}
[data-theme="dark"] .shimmer::after{background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 100%);}
@keyframes shimmer{from{transform:translateX(-100%);}to{transform:translateX(100%);}}

/* ═══════ ITEMS ═══════ */
.items-list{display:grid;gap:8px;}
.items-list.view-list{grid-template-columns:1fr;}
.items-list.view-grid{grid-template-columns:repeat(auto-fill,minmax(270px,1fr));}
.item{padding:13px 16px;border-radius:13px;background:var(--item-bg);border:1.5px solid var(--item-border);display:flex;align-items:center;gap:12px;min-width:0;cursor:pointer;position:relative;overflow:hidden;transition:border-color .17s,box-shadow .17s,transform .17s,background .3s;animation:slideIn .26s ease both;}
