<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Essência</title>
<style>
/* ═══════════════════════════════════════════════
   CSS TOKENS — light / dark
   ═══════════════════════════════════════════════ */
:root {
  --bg:                  #eef0f3;
  --surface:             rgba(255,255,255,0.88);
  --surface-solid:       #ffffff;
  --border:              rgba(0,0,0,0.08);
  --text-primary:        #1a1a1a;
  --text-secondary:      #555;
  --text-muted:          #aaa;
  --input-bg:            #f5f6f8;
  --input-border:        #e0e0e0;
  --input-focus-border:  #43a047;
  --input-focus-shadow:  rgba(67,160,71,0.14);
  --item-bg:             #f9fafb;
  --item-border:         #ebebeb;
  --item-hover-border:   #a5d6a7;
  --item-hover-shadow:   rgba(46,125,50,0.14);
  --chip-bg:             #f1f8f1;
  --chip-border:         #c8e6c9;
  --badge-bg:            #f1f8f1;
  --badge-color:         #388e3c;
  --mark-bg:             #fff59d;
  --mark-color:          inherit;
  --scrollbar-thumb:     #c8e6c9;
  --scrollbar-track:     transparent;
  --kbd-bg:              rgba(255,255,255,0.85);
  --kbd-border:          #d0d0d0;
  --toggle-bg:           #ededf0;
  --toggle-color:        #555;
  --divider:             #f0f0f0;
  --shadow-card:         0 2px 4px rgba(0,0,0,0.06),0 8px 28px rgba(0,0,0,0.10);
  --shadow-sidebar:      4px 0 24px rgba(0,0,0,0.08);
  --green-deep:          #1b5e20;
  --green-mid:           #2e7d32;
  --green-base:          #43a047;
  --green-light:         #66bb6a;
  --green-pale:          #a5d6a7;
  --danger:              #c62828;
  --danger-bg:           #ffebee;
  --warning:             #e65100;
  --warning-bg:          #fff3e0;
  --ok-bg:               #f1f8f1;
  --ok-color:            #2e7d32;
  --sidebar-width:       280px;
}
[data-theme="dark"] {
  --bg:                  #0d1117;
  --surface:             rgba(22,27,34,0.95);
  --surface-solid:       #161b22;
  --border:              rgba(255,255,255,0.08);
  --text-primary:        #e6edf3;
  --text-secondary:      #8b949e;
  --text-muted:          #484f58;
  --input-bg:            #161b22;
  --input-border:        #30363d;
  --input-focus-border:  #66bb6a;
  --input-focus-shadow:  rgba(102,187,106,0.18);
  --item-bg:             #161b22;
  --item-border:         #21262d;
  --item-hover-border:   #66bb6a;
  --item-hover-shadow:   rgba(102,187,106,0.16);
  --chip-bg:             #1a2e1c;
  --chip-border:         #2d4830;
  --badge-bg:            #1a2e1c;
  --badge-color:         #81c784;
  --mark-bg:             rgba(255,245,0,0.22);
  --mark-color:          #fff59d;
  --scrollbar-thumb:     #30363d;
  --scrollbar-track:     transparent;
  --kbd-bg:              rgba(255,255,255,0.07);
  --kbd-border:          #3a5a3c;
  --toggle-bg:           #21262d;
  --toggle-color:        #8b949e;
  --divider:             #21262d;
  --shadow-card:         0 2px 4px rgba(0,0,0,0.35),0 8px 28px rgba(0,0,0,0.45);
  --shadow-sidebar:      4px 0 24px rgba(0,0,0,0.35);
  --green-deep:          #1b5e20;
  --green-mid:           #2e7d32;
  --green-base:          #43a047;
  --green-light:         #66bb6a;
  --green-pale:          #388e3c;
  --danger:              #ef5350;
  --danger-bg:           #1c1010;
  --warning:             #ffa726;
  --warning-bg:          #1c1500;
  --ok-bg:               #1a2e1c;
  --ok-color:            #81c784;
}
html[data-hc="1"] { --text-primary:#000!important;--text-secondary:#111!important;--text-muted:#333!important;--item-border:#444!important;--border:#444!important; }
html[data-hc="1"][data-theme="dark"] { --text-primary:#fff!important;--text-secondary:#eee!important;--text-muted:#bbb!important;--item-border:#66bb6a!important; }

/* ═══════ RESET ═══════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--scrollbar-track);}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--green-pale);}
*{scrollbar-width:thin;scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track);}

body {
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ═══════ ORBS ═══════ */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat linear infinite;}
.orb-1{width:480px;height:480px;background:radial-gradient(circle,#43a047 0%,#1b5e20 60%,transparent 100%);top:-120px;left:-100px;animation-duration:18s;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#1565c0 0%,#0d47a1 60%,transparent 100%);top:40%;right:-120px;animation-duration:22s;animation-delay:-7s;}
.orb-3{width:360px;height:360px;background:radial-gradient(circle,#c2185b 0%,#880e4f 60%,transparent 100%);bottom:-80px;left:30%;animation-duration:26s;animation-delay:-13s;}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1);}25%{transform:translate(40px,-30px) scale(1.06);}50%{transform:translate(-20px,50px) scale(0.94);}75%{transform:translate(30px,20px) scale(1.03);}100%{transform:translate(0,0) scale(1);}}

/* ═══════ SIDEBAR ═══════ */
.sidebar {
  position:fixed;top:0;left:0;
  width:var(--sidebar-width);height:100vh;
  background:var(--surface);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-right:1px solid var(--border);
  box-shadow:var(--shadow-sidebar);
  z-index:200;display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
.sb-header{padding:20px 20px 16px;border-bottom:1px solid var(--divider);flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:12px;}
.sb-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#2e7d32,#43a047);border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(46,125,50,.4);flex-shrink:0;}
.sb-logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sb-app-name{font-size:14px;font-weight:700;color:var(--text-primary);}
.sb-version{font-size:10px;color:var(--text-muted);margin-top:1px;}
.sb-section{padding:14px 12px 8px;}
.sb-section-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;padding:0 8px;}
.sb-nav{display:flex;flex-direction:column;gap:2px;}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:none;border:none;cursor:pointer;
  color:var(--text-secondary);font-size:13px;font-weight:500;
  width:100%;text-align:left;
  transition:background .15s,color .15s;
  border-left:3px solid transparent;
}
.sb-item:hover:not(:disabled){background:var(--item-bg);color:var(--text-primary);}
.sb-item.active{background:rgba(46,125,50,.10);color:var(--green-mid);font-weight:700;border-left-color:var(--green-base);}
[data-theme="dark"] .sb-item.active{background:rgba(67,160,71,.12);color:var(--green-light);}
.sb-item-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sb-item-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.sb-item-label{flex:1;}
.sb-item--soon{opacity:.4;cursor:not-allowed;}
.sb-soon-badge{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;background:var(--toggle-bg);color:var(--text-muted);border-radius:4px;padding:2px 5px;}
.sb-divider{height:1px;background:var(--divider);margin:4px 12px;}
.sb-tools{border-top:1px solid var(--divider);flex-shrink:0;padding:12px 12px 8px;}
.sb-tool-btn{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:13px;width:100%;text-align:left;transition:background .15s,color .15s;}
.sb-tool-btn:hover{background:var(--item-bg);color:var(--text-primary);}
.sb-tool-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.sb-footer{margin-top:auto;padding:12px 20px;border-top:1px solid var(--divider);font-size:10px;color:var(--text-muted);flex-shrink:0;}

/* ═══════ SIDEBAR OVERLAY ═══════ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;opacity:0;pointer-events:none;transition:opacity .28s ease;}
.sidebar-overlay.open{opacity:1;pointer-events:auto;}

/* ═══════ MAIN WRAPPER ═══════ */
.main-wrapper{margin-left:var(--sidebar-width);min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}

/* ═══════ MAIN HEADER ═══════ */
.main-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 24px;gap:12px;
  background:var(--surface);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.mh-left{display:flex;align-items:center;gap:10px;min-width:0;}
.mh-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.hamburger-btn{display:none;background:var(--toggle-bg);border:none;cursor:pointer;color:var(--toggle-color);width:36px;height:36px;border-radius:10px;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .2s;}
.hamburger-btn:hover{transform:scale(1.08);}
.hamburger-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.mh-breadcrumb{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-muted);}
.mh-bread-sep svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.4;}
.mh-bread-current{font-weight:600;color:var(--text-primary);}
.mh-greeting{font-size:13px;color:var(--text-muted);padding-left:10px;border-left:1px solid var(--border);white-space:nowrap;}
.session-stats{display:none;align-items:center;background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text-muted);white-space:nowrap;}
.session-stats.visible{display:flex;}
.icon-btn{background:var(--toggle-bg);border:none;cursor:pointer;color:var(--toggle-color);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s,transform .2s;position:relative;}
.icon-btn:hover{transform:scale(1.08);}
.icon-btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ═══════ MAIN CONTENT ═══════ */
.main-content{flex:1;padding:24px 24px 80px;transition:opacity 200ms ease;}

/* ═══════ CARD ═══════ */
.card{background:var(--surface);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:22px;border:1px solid var(--border);box-shadow:var(--shadow-card);overflow:hidden;transition:background .3s,border-color .3s;}

/* ═══════ INVENTÁRIO — HERO ═══════ */
.hero{height:72px;background:linear-gradient(105deg,#1b5e20 0%,#2e7d32 38%,#388e3c 68%,#43a047 100%);position:relative;overflow:hidden;}
.hero-pattern{position:absolute;inset:0;width:100%;height:100%;opacity:.15;}
.hero-content{position:absolute;inset:0;display:flex;align-items:center;padding:0 28px;gap:12px;}
.hero-icon{width:20px;height:20px;stroke:rgba(255,255,255,.88);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.hero-text{color:rgba(255,255,255,.92);flex:1;}
.hero-title{font-size:14px;font-weight:700;}
.hero-sub{font-size:11px;opacity:.72;margin-top:1px;}
.hero-sub strong{font-weight:700;}
.header-icon-wrap{position:relative;flex-shrink:0;}
.header-icon{width:40px;height:40px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.header-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.header-icon.spin-once{animation:spinOnce .5s ease;}
@keyframes spinOnce{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.result-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:9px;padding:0 4px;background:var(--green-base);color:#fff;font-size:10px;font-weight:800;line-height:18px;text-align:center;opacity:0;transform:scale(0);transition:opacity .2s,transform .2s;pointer-events:none;}
.result-badge.visible{opacity:1;transform:scale(1);}

/* ═══════ INVENTÁRIO — SEARCH ═══════ */
.search-area{padding:22px 26px;border-bottom:1px solid var(--divider);}
.search-wrapper{position:relative;}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;pointer-events:none;color:var(--text-muted);}
.search-icon.pulsing{animation:pulseIcon .7s ease infinite;}
@keyframes pulseIcon{0%,100%{transform:translateY(-50%) scale(1);opacity:1;}50%{transform:translateY(-50%) scale(1.3);opacity:.5;}}
.search-box{width:100%;height:54px;padding:0 48px;font-size:16px;border-radius:14px;border:1.5px solid var(--input-border);outline:none;background:var(--input-bg);color:var(--text-primary);transition:border-color .22s,box-shadow .22s,background .22s;}
.search-box::placeholder{color:var(--text-muted);}
.search-box:focus{background:var(--surface-solid);border-color:var(--input-focus-border);box-shadow:0 0 0 4px var(--input-focus-shadow);}
.ghost-suggestion{position:absolute;left:48px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;color:var(--text-muted);opacity:.5;white-space:nowrap;overflow:hidden;}
.clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--input-border);border:none;cursor:pointer;color:var(--text-muted);width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;transition:background .15s;}
.clear-btn:hover{background:var(--item-hover-border);color:#fff;}
.clear-btn.visible{display:flex;}
.ghost-hint{font-size:11px;color:var(--text-muted);padding:5px 4px 0;min-height:18px;}
.ghost-hint .ghost-tab{display:inline-block;background:var(--toggle-bg);border-radius:4px;padding:0 5px;font-size:10px;font-weight:700;margin-right:3px;}
.term-pills-wrap{overflow:hidden;max-height:0;opacity:0;transition:max-height .25s ease,opacity .25s ease;margin-top:0;}
.term-pills-wrap.open{max-height:80px;opacity:1;margin-top:10px;}
.term-pills-inner{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.term-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(21,101,192,.12);color:#1565c0;border:1px solid rgba(21,101,192,.25);}
[data-theme="dark"] .term-pill{background:rgba(100,149,237,.15);color:#90caf9;border-color:rgba(100,149,237,.3);}
.term-pill-x{background:none;border:none;cursor:pointer;color:inherit;opacity:.6;display:flex;align-items:center;padding:0;}
.term-pill-x:hover{opacity:1;}
.recents-wrap{margin-top:14px;}
.recents-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.recents-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);}
.recents{display:flex;flex-wrap:wrap;gap:6px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:20px;padding:4px 6px 4px 9px;font-size:11.5px;color:var(--green-mid);cursor:pointer;transition:background .15s,border-color .15s;}
.chip:hover{background:var(--item-bg);border-color:var(--item-hover-border);}
.chip-text{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip-remove{background:none;border:none;cursor:pointer;color:var(--chip-border);padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;width:16px;height:16px;transition:color .15s;flex-shrink:0;}
.chip-remove:hover{color:var(--green-mid);}
.clear-all-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-muted);padding:2px 7px;border-radius:5px;transition:color .15s;}
.clear-all-btn:hover{color:var(--green-mid);}

/* ═══════ INVENTÁRIO — RESULTS ═══════ */
.results-area{padding:0 26px 26px;}
.toolbar{display:flex;align-items:center;justify-content:space-between;overflow:hidden;max-height:0;opacity:0;margin-bottom:0;transition:max-height .22s,opacity .22s,margin-bottom .22s;flex-wrap:wrap;gap:6px;}
.toolbar.visible{max-height:60px;opacity:1;margin-bottom:14px;margin-top:18px;}
.toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.toolbar-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.result-count{font-size:12px;color:var(--text-muted);}
.result-count strong{color:var(--green-light);font-weight:600;}
.cache-badge{display:inline-flex;align-items:center;background:rgba(102,187,106,.18);color:var(--green-light);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;margin-left:4px;}
.resp-time{font-size:10.5px;color:var(--text-muted);}
.loading{display:none;align-items:center;gap:7px;font-size:12px;color:var(--text-muted);}
.loading.visible{display:flex;}
.spinner{width:12px;height:12px;border:2px solid var(--input-border);border-top-color:var(--green-light);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.view-toggles{display:flex;gap:3px;}
.view-btn{background:var(--toggle-bg);border:none;cursor:pointer;color:var(--text-muted);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.view-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.view-btn.active{background:var(--green-mid);color:#fff;}
.small-btn{display:flex;align-items:center;gap:4px;background:var(--toggle-bg);border:none;cursor:pointer;color:var(--text-muted);font-size:11px;font-weight:500;padding:0 9px;height:30px;border-radius:8px;white-space:nowrap;transition:background .15s,color .15s;}
.small-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.small-btn:hover{background:var(--chip-bg);color:var(--green-mid);}
.toolbar-sort{padding:4px 8px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text-secondary);font-size:11px;outline:none;cursor:pointer;height:30px;transition:border-color .2s;}
.toolbar-sort:focus{border-color:var(--input-focus-border);}

/* ═══════ SKELETON ═══════ */
.skeleton-list{display:grid;gap:8px;}
.skeleton-item{padding:13px 16px;border-radius:13px;background:var(--item-bg);border:1.5px solid var(--item-border);display:flex;align-items:center;gap:12px;}
.skel-icon{width:38px;height:38px;border-radius:10px;background:var(--divider);flex-shrink:0;overflow:hidden;}
.skel-body{flex:1;display:flex;flex-direction:column;gap:7px;}
.skel-line{height:12px;border-radius:6px;background:var(--divider);overflow:hidden;}
.skel-line.short{width:40%;}
.shimmer{position:relative;overflow:hidden;}
.shimmer::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.4) 50%,transparent 100%);animation:shimmer 1.4s ease infinite;}
[data-theme="dark"] .shimmer::after{background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 100%);}
@keyframes shimmer{from{transform:translateX(-100%);}to{transform:translateX(100%);}}

/* ═══════ ITEMS ═══════ */
.items-list{display:grid;gap:8px;}
.items-list.view-list{grid-template-columns:1fr;}
.items-list.view-grid{grid-template-columns:repeat(auto-fill,minmax(270px,1fr));}
.item{padding:13px 16px;border-radius:13px;background:var(--item-bg);border:1.5px solid var(--item-border);display:flex;align-items:center;gap:12px;min-width:0;cursor:pointer;position:relative;overflow:hidden;transition:border-color .17s,box-shadow .17s,transform .17s,background .3s;animation:slideIn .26s ease both;}
.item::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(67,160,71,0) 0%,rgba(67,160,71,.07) 100%);opacity:0;transition:opacity .17s;pointer-events:none;}
.item:hover::after{opacity:1;}
.item:hover{border-color:var(--item-hover-border);box-shadow:0 6px 22px var(--item-hover-shadow);transform:translateY(-2px);}
.item:hover .item-icon svg{transform:rotate(-5deg) scale(1.08);}
.item--focused{border-color:var(--input-focus-border)!important;box-shadow:0 0 0 3px var(--input-focus-shadow),0 6px 20px var(--item-hover-shadow)!important;transform:translateY(-2px);}
.item.flash{animation:flashCopy .4s ease;}
@keyframes flashCopy{0%{background:rgba(67,160,71,.25);}100%{background:var(--item-bg);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px) scale(.98);}to{opacity:1;transform:translateX(0) scale(1);}}
html[data-density="compact"] .item{padding:8px 12px;}
html[data-density="spacious"] .item{padding:20px 22px;}
.item-icon{width:36px;height:36px;background:var(--badge-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.item-icon svg{width:17px;height:17px;stroke:var(--green-mid);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;}
.item-info{flex:1;min-width:0;}
.produto{font-size:14px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.produto mark{background:var(--mark-bg);color:var(--mark-color);border-radius:2px;padding:0 1px;font-weight:700;font-style:normal;}
.caixa-badge{display:inline-flex;align-items:center;gap:4px;background:var(--badge-bg);color:var(--badge-color);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:500;margin-top:5px;}
.caixa-badge svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:linear-gradient(90deg,rgba(46,125,50,.10),rgba(46,125,50,.04));border:1px solid var(--chip-border);border-radius:11px;cursor:pointer;margin-bottom:6px;font-size:12.5px;font-weight:700;color:var(--green-mid);user-select:none;}
.group-header:hover{background:linear-gradient(90deg,rgba(46,125,50,.16),rgba(46,125,50,.08));}
.group-chevron{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .25s;flex-shrink:0;}
.group-chevron.open{transform:rotate(180deg);}
.group-body{overflow:hidden;display:grid;gap:8px;}
.group-section{margin-bottom:14px;}

/* ═══════ STATES ═══════ */
.state-box{padding:38px 28px;text-align:center;}
.state-icon{width:52px;height:52px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;border-radius:14px;}
.state-title{font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:5px;}
.state-desc{font-size:12.5px;color:var(--text-muted);line-height:1.6;}
.state-hint .state-icon{background:#f0f4ff;}
.state-empty .state-icon{background:#fff8e1;}
.state-min .state-icon{background:#f5f5f5;}
[data-theme="dark"] .state-hint .state-icon{background:#0f142a;}
[data-theme="dark"] .state-empty .state-icon{background:#251a00;}
[data-theme="dark"] .state-min .state-icon{background:#1a2e1c;}

/* ═══════ VALIDADE PAGE ═══════ */
.val-page{display:flex;flex-direction:column;gap:18px;}
.val-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.val-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;align-items:center;gap:14px;}
.val-sum-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.val-sum-icon svg{width:20px;height:20px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.val-sum-icon.total{background:var(--chip-bg);}
.val-sum-icon.total svg{stroke:var(--green-mid);}
.val-sum-icon.atencao{background:var(--warning-bg);}
.val-sum-icon.atencao svg{stroke:var(--warning);}
.val-sum-icon.critico{background:var(--danger-bg);}
.val-sum-icon.critico svg{stroke:var(--danger);}
.val-sum-num{font-size:26px;font-weight:800;color:var(--text-primary);line-height:1;}
.val-sum-lbl{font-size:11px;color:var(--text-muted);margin-top:3px;}
.val-filters{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.val-filter-input{flex:1;min-width:160px;height:38px;padding:0 14px;border-radius:10px;border:1.5px solid var(--input-border);background:var(--input-bg);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;}
.val-filter-input:focus{border-color:var(--input-focus-border);box-shadow:0 0 0 3px var(--input-focus-shadow);}
.val-filter-input::placeholder{color:var(--text-muted);}
.val-select{height:38px;padding:0 10px;border-radius:10px;border:1.5px solid var(--input-border);background:var(--input-bg);color:var(--text-secondary);font-size:12px;outline:none;cursor:pointer;transition:border-color .2s;}
.val-select:focus{border-color:var(--input-focus-border);}
.val-refresh-btn{height:38px;padding:0 16px;border-radius:10px;background:var(--chip-bg);border:1px solid var(--chip-border);color:var(--green-mid);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:background .15s,color .15s;}
.val-refresh-btn:hover{background:var(--green-mid);color:#fff;}
.val-refresh-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.val-count-bar{font-size:12px;color:var(--text-muted);}
.val-count-bar strong{color:var(--text-primary);}
.val-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.val-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:16px 18px;transition:border-color .17s,box-shadow .17s,transform .17s;animation:slideIn .26s ease both;}
.val-card:hover{border-color:var(--item-hover-border);box-shadow:0 6px 22px var(--item-hover-shadow);transform:translateY(-2px);}
.val-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.val-prod-name{font-size:14px;font-weight:700;color:var(--text-primary);flex:1;line-height:1.3;}
.val-dias-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.dias-ok{background:var(--ok-bg);color:var(--ok-color);}
.dias-warn{background:var(--warning-bg);color:var(--warning);}
.dias-crit{background:var(--danger-bg);color:var(--danger);}
.val-date{font-size:13px;font-weight:600;color:var(--text-primary);}
.val-lote-eta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.val-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;}
.badge-ok{background:var(--ok-bg);color:var(--ok-color);}
.badge-warn{background:var(--warning-bg);color:var(--warning);}
.badge-crit{background:var(--danger-bg);color:var(--danger);}
.badge-temos{background:rgba(46,125,50,.12);color:var(--green-mid);}
.badge-falta{background:var(--danger-bg);color:var(--danger);}
.badge-produzir{background:rgba(245,127,23,.12);color:#f57f17;}
[data-theme="dark"] .badge-temos{background:rgba(67,160,71,.15);color:var(--green-light);}
[data-theme="dark"] .badge-falta{background:rgba(198,40,40,.15);color:#ef5350;}
[data-theme="dark"] .badge-produzir{background:rgba(245,127,23,.15);color:#ffb74d;}
.val-obs{font-size:11px;color:var(--text-muted);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--divider);}

/* ═══════ TOAST ═══════ */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:9px;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:500;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.22);pointer-events:auto;animation:toastIn .25s ease both;min-width:180px;max-width:340px;}
.toast.removing{animation:toastOut .25s ease forwards;}
@keyframes toastIn{from{opacity:0;transform:translateY(18px) scale(.93);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(14px) scale(.93);}}
.toast-ok{background:linear-gradient(135deg,#2e7d32,#43a047);}
.toast-copy{background:linear-gradient(135deg,#1565c0,#1976d2);}
.toast-err{background:linear-gradient(135deg,#b71c1c,#c62828);}
.toast svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.toast-msg{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ═══════ SHORTCUTS OVERLAY ═══════ */
.overlay-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay-backdrop.open{opacity:1;pointer-events:auto;}
.overlay-modal{background:var(--surface-solid);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow-card);padding:28px 30px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto;transform:scale(.94);transition:transform .2s;}
.overlay-backdrop.open .overlay-modal{transform:scale(1);}
.overlay-title{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--text-primary);display:flex;align-items:center;justify-content:space-between;}
.overlay-close{background:none;border:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;padding:2px;border-radius:6px;}
.overlay-close:hover{color:var(--text-primary);}
.shortcut-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--divider);font-size:12.5px;color:var(--text-secondary);}
.shortcut-row:last-child{border-bottom:none;}
.shortcut-keys{display:flex;gap:4px;}
.kbd{display:inline-flex;align-items:center;background:var(--kbd-bg);border:1px solid var(--kbd-border);border-bottom-width:2px;border-radius:4px;padding:1px 6px;font-size:10.5px;font-family:monospace;color:var(--text-secondary);line-height:1.6;}

/* ═══════ SCROLL TO TOP ═══════ */
.scroll-top{position:fixed;bottom:28px;right:22px;z-index:800;background:var(--green-mid);color:#fff;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(46,125,50,.4);opacity:0;transform:translateY(16px) scale(.85);transition:opacity .25s,transform .25s;pointer-events:none;}
.scroll-top.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.scroll-top:hover{background:var(--green-base);}
.scroll-top svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:7000;}

/* ═══════ RESPONSIVE ═══════ */
@media (max-width:1099px) {
  .sidebar{transform:translateX(calc(-1 * var(--sidebar-width)));}
  .sidebar.open{transform:translateX(0);}
  .main-wrapper{margin-left:0;}
  .hamburger-btn{display:flex;}
  .mh-greeting{display:none;}
  .val-summary{grid-template-columns:1fr 1fr;}
}
@media (max-width:599px) {
  .main-content{padding:14px 14px 80px;}
  .search-area{padding:16px 16px;}
  .results-area{padding:0 16px 20px;}
  .val-summary{grid-template-columns:1fr;}
  .val-grid{grid-template-columns:1fr;}
  .val-filters{flex-direction:column;align-items:stretch;}
  .val-filter-input,.val-select{width:100%;}
  .toolbar.visible{max-height:100px;}
}
@media print {
  .orbs,.sidebar,.sidebar-overlay,.main-header,.scroll-top,.toast-container,.overlay-backdrop,#confetti-canvas{display:none!important;}
  .main-wrapper{margin-left:0;}
  body{background:#fff!important;}
  .card{box-shadow:none!important;border:1px solid #ccc!important;}
}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════ */
(function() {
'use strict';

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function highlight(text, terms) {
  var safe = escHtml(text);
  terms.forEach(function(t) {
    if (!t) return;
    var re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi');
    safe = safe.replace(re,'<mark>$1</mark>');
  });
  return safe;
}
function qs(sel, ctx) { return (ctx || document).querySelector(sel); }
function qsa(sel, ctx) { return Array.prototype.slice.call((ctx || document).querySelectorAll(sel)); }
function fmtDate(str) {
  if (!str) return '';
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return str;
  var d = new Date(str);
  if (isNaN(d.getTime())) return str;
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}

/* ═══════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════ */
function showToast(msg, type) {
  var c = qs('#toastContainer');
  if (!c) return;
  var icons = {
    ok:   '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
    copy: '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
    err:  '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  };
  var t = document.createElement('div');
  t.className = 'toast toast-'+(type||'ok');
  t.innerHTML = (icons[type]||icons.ok)+'<span class="toast-msg">'+escHtml(msg)+'</span>';
  c.appendChild(t);
  setTimeout(function() {
    t.classList.add('removing');
    setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 280);
  }, 2600);
}

var APP = {
  theme:    localStorage.getItem('inv_theme') || 'light',
  density:  localStorage.getItem('inv_density') || 'normal',
  hc:       localStorage.getItem('inv_hc') === '1',
  statSearches: 0,
  statFound:    0,
  statLongest:  '',
  recents: (function() {
    try { return JSON.parse(localStorage.getItem('inv_recents')||'[]'); } catch(e) { return []; }
  })(),

  applyTheme: function(t) {
    APP.theme = t;
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('inv_theme', t);
    var icon = qs('#sidebarThemeIcon');
    var lbl  = qs('#sidebarThemeLbl');
    if (t === 'dark') {
      if (icon) icon.innerHTML = '<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      if (lbl) lbl.textContent = 'Tema claro';
    } else {
      if (icon) icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      if (lbl) lbl.textContent = 'Tema escuro';
    }
  },

  applyDensity: function(d) {
    APP.density = d;
    document.documentElement.setAttribute('data-density', d);
    localStorage.setItem('inv_density', d);
    var names = {normal:'Normal',compact:'Compacto',spacious:'Espaçoso'};
    var lbl = qs('#sidebarDensityLabel');
    if (lbl) lbl.textContent = 'Densidade: '+(names[d]||d);
  },

  applyHC: function(v) {
    APP.hc = v;
    document.documentElement.setAttribute('data-hc', v?'1':'0');
    localStorage.setItem('inv_hc', v?'1':'0');
  },

  updateStats: function(term, count) {
    APP.statSearches++;
    APP.statFound += count;
    if (term.length > APP.statLongest.length) APP.statLongest = term;
    var pill = qs('#sessionStats');
    if (pill) { pill.textContent = APP.statSearches+' busc. · '+APP.statFound+' ach.'; pill.classList.add('visible'); }
  }
};

/* ═══════════════════════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════════════════════ */
var ROUTER = {
  currentPage: null,
  history: [],

  navigate: function(pageId) {
    if (ROUTER.currentPage === pageId) {
      if (window.innerWidth < 1100) SIDEBAR.close();
      return;
    }
    var page = PAGES[pageId];
    if (!page) return;

    // Update sidebar active state
    qsa('.sb-item[data-page]').forEach(function(el) {
      el.classList.toggle('active', el.getAttribute('data-page') === pageId);
    });

    var main = qs('#main-content');

    function doSwitch() {
      // Destroy current page
      if (ROUTER.currentPage && PAGES[ROUTER.currentPage] && PAGES[ROUTER.currentPage].destroy) {
        PAGES[ROUTER.currentPage].destroy();
      }
      ROUTER.history.push(pageId);
      ROUTER.currentPage = pageId;

      // Render
      main.innerHTML = page.render();

      // Update hash
      window.location.hash = '#'+(pageId === 'inventario' ? 'inventario' : pageId);

      // Breadcrumb
      var bc = qs('#breadcrumbCurrent');
      if (bc) bc.textContent = page.label;

      // Greeting
      var greet = qs('#headerGreeting');
      if (greet) {
        if (pageId === 'inventario') {
          var h = new Date().getHours();
          greet.textContent = h < 12 ? 'Bom dia 👋' : h < 18 ? 'Boa tarde 👋' : 'Boa noite 👋';
          greet.style.display = '';
        } else {
          greet.style.display = 'none';
        }
      }

      // Fade in
      main.style.opacity = '0';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          main.style.opacity = '1';
          if (page.init) page.init();
        });
      });
    }

    if (ROUTER.currentPage) {
      main.style.transition = 'opacity 150ms ease';
      main.style.opacity = '0';
      setTimeout(doSwitch, 155);
    } else {
      main.style.transition = 'opacity 200ms ease';
      doSwitch();
    }
  }
};

/* ═══════════════════════════════════════════════════════════
   PAGES.INVENTARIO
   ═══════════════════════════════════════════════════════════ */
var INV = {
  lastResults: [],
  lastTerms:   [],
  currentTerms: [],
  debounceTimer: null,
  focusedIndex:  -1,
  viewMode: localStorage.getItem('inv_view') || 'list',
  sortMode: localStorage.getItem('inv_sort') || 'default',

  getCache: function(term) {
    try { var r = sessionStorage.getItem('inv_cache_'+term.toLowerCase().trim()); return r ? JSON.parse(r) : null; } catch(e) { return null; }
  },
  setCache: function(term, data) {
    try { sessionStorage.setItem('inv_cache_'+term.toLowerCase().trim(), JSON.stringify(data)); } catch(e) {}
  },

  saveRecent: function(term) {
    if (!term || term.length < 2) return;
    APP.recents = APP.recents.filter(function(r) { return r.term !== term; });
    APP.recents.unshift({term: term, ts: Date.now()});
    if (APP.recents.length > 8) APP.recents = APP.recents.slice(0,8);
    localStorage.setItem('inv_recents', JSON.stringify(APP.recents));
  },
  removeRecent: function(term) {
    APP.recents = APP.recents.filter(function(r) { return r.term !== term; });
    localStorage.setItem('inv_recents', JSON.stringify(APP.recents));
    INV.renderRecentsChips();
  },
  clearAllRecents: function() {
    APP.recents = [];
    localStorage.removeItem('inv_recents');
    INV.renderRecentsChips();
  },

  renderRecentsChips: function() {
    var wrap = qs('#recentsWrap'), list = qs('#recentsList');
    if (!wrap || !list) return;
    if (!APP.recents.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    list.innerHTML = '';
    var frag = document.createDocumentFragment();
    APP.recents.forEach(function(r) {
      var chip = document.createElement('span');
      chip.className = 'chip';
      chip.innerHTML =
        '<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.25"/></svg>'+
        '<span class="chip-text">'+escHtml(r.term)+'</span>'+
        '<button class="chip-remove" aria-label="Remover"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
      (function(term) {
        chip.querySelector('.chip-text').addEventListener('click', function() { var sb=qs('#searchBox'); if(sb){sb.value=term; INV.triggerSearch(term,true);} });
        chip.querySelector('.chip-remove').addEventListener('click', function(e) { e.stopPropagation(); INV.removeRecent(term); });
      })(r.term);
      frag.appendChild(chip);
    });
    list.appendChild(frag);
  },

  renderTermPills: function(terms) {
    INV.currentTerms = terms;
    var wrap = qs('#termPillsWrap'), el = qs('#termPills');
    if (!wrap || !el) return;
    if (terms.length <= 1) { wrap.classList.remove('open'); return; }
    wrap.classList.add('open');
    el.innerHTML = '';
    var frag = document.createDocumentFragment();
    terms.forEach(function(t, i) {
      if (!t) return;
      var pill = document.createElement('span');
      pill.className = 'term-pill';
      pill.innerHTML = escHtml(t)+'<button class="term-pill-x"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
      (function(idx) {
        pill.querySelector('.term-pill-x').addEventListener('click', function() {
          var newVal = INV.currentTerms.filter(function(_,j){return j!==idx;}).join('+');
          var sb = qs('#searchBox'); if(sb) sb.value = newVal;
          INV.triggerSearch(newVal, true);
        });
      })(i);
      frag.appendChild(pill);
    });
    el.appendChild(frag);
  },

  updateGhostSuggestion: function(val) {
    var gs = qs('#ghostSuggestion'), gh = qs('#ghostHint');
    if (!gs || !gh) return;
    if (!val) { gs.textContent=''; gh.innerHTML=''; return; }
    var match = APP.recents.find(function(r) {
      return r.term.toLowerCase().startsWith(val.toLowerCase()) && r.term.toLowerCase() !== val.toLowerCase();
    });
    if (match) {
      gs.textContent = match.term;
      gh.innerHTML = '<span class="ghost-tab">Tab</span> para aceitar "'+escHtml(match.term)+'"';
    } else {
      gs.textContent = '';
      gh.innerHTML = val.includes('+') ? '<span class="ghost-tab">+</span> adicione mais termos' : '';
    }
  },

  triggerSearch: function(term, immediate) {
    clearTimeout(INV.debounceTimer);
    INV.debounceTimer = setTimeout(function() { INV.doSearch(term); }, immediate ? 0 : 280);
  },

  doSearch: function(rawTerm) {
    var term = rawTerm.trim();
    if (term.length < 2) { INV.showState('min'); return; }
    var terms = term.split('+').map(function(t){return t.trim();}).filter(Boolean);
    INV.renderTermPills(terms);

    var hi = qs('#headerIcon');
    if (hi) { hi.classList.remove('spin-once'); void hi.offsetWidth; hi.classList.add('spin-once'); }
    var si = qs('#searchIcon');
    if (si) si.classList.add('pulsing');

    var cached = INV.getCache(term);
    if (cached) {
      if (si) si.classList.remove('pulsing');
      INV.renderResults(cached, terms, true);
      var tb = qs('#toolbar'); if (tb) tb.classList.add('visible');
      INV.saveRecent(term);
      APP.updateStats(term, cached.length);
      return;
    }

    INV.showSkeleton(4);
    var toolbar = qs('#toolbar'); if (toolbar) toolbar.classList.add('visible');
    var li = qs('#loadingIndicator'); if (li) li.classList.add('visible');
    var rc = qs('#resultCount'); if (rc) rc.innerHTML = '';
    var rt = qs('#respTime'); if (rt) rt.textContent = '';
    INV.focusedIndex = -1;
    var startTime = Date.now();

    google.script.run
      .withSuccessHandler(function(rows) {
        var elapsed = Date.now() - startTime;
        if (si) si.classList.remove('pulsing');
        if (li) li.classList.remove('visible');
        var results = rows || [];
        INV.setCache(term, results);
        INV.saveRecent(term);
        INV.renderResults(results, terms, false, elapsed);
        APP.updateStats(term, results.length);
        window.location.hash = '#q='+encodeURIComponent(term);
        if (results.length === 1) INV.fireConfetti();
      })
      .withFailureHandler(function(err) {
        if (si) si.classList.remove('pulsing');
        if (li) li.classList.remove('visible');
        INV.showState('err', err && err.message ? err.message : 'Erro ao buscar.');
        showToast('Erro: '+(err&&err.message?err.message:'falha'), 'err');
      })
      .buscarProdutosWeb(term);
  },

  sortItems: function(items) {
    if (!items || !items.length) return items;
    var copy = items.slice(), s = INV.sortMode;
    if (s==='name-az') copy.sort(function(a,b){return (a.produto||'').localeCompare(b.produto||'');});
    else if (s==='name-za') copy.sort(function(a,b){return (b.produto||'').localeCompare(a.produto||'');});
    else if (s==='box-az') copy.sort(function(a,b){return (a.caixa||'').localeCompare(b.caixa||'');});
    return copy;
  },

  renderResults: function(rows, terms, fromCache, elapsed) {
    INV.lastResults = rows; INV.lastTerms = terms||[]; INV.focusedIndex = -1;
    var sorted = INV.sortItems(rows);
    var toolbar = qs('#toolbar'); if (toolbar) toolbar.classList.add('visible');
    var li = qs('#loadingIndicator'); if (li) li.classList.remove('visible');
    var rc = qs('#resultCount'), rt = qs('#respTime'), rb = qs('#resultBadge'), hs = qs('#heroSub');

    if (!rows || !rows.length) {
      if (rc) rc.innerHTML = '<strong style="color:var(--text-muted)">0</strong> resultado';
      if (rt) rt.textContent = elapsed ? elapsed+'ms' : '';
      INV.showState('empty');
      if (hs) hs.textContent = 'Nenhum produto encontrado';
      if (rb) { rb.textContent='0'; rb.classList.add('visible'); }
      return;
    }

    if (rc) {
      rc.innerHTML = '';
      var span = document.createElement('span'); span.className='result-count';
      var bold = document.createElement('strong'); bold.textContent='0';
      span.appendChild(bold);
      span.appendChild(document.createTextNode(' '+(rows.length===1?'produto':'produtos')));
      if (fromCache) { var b=document.createElement('span'); b.className='cache-badge'; b.textContent='⚡ cache'; span.appendChild(b); }
      rc.appendChild(span);
      INV.animateCount(bold, rows.length);
    }
    if (rt) rt.textContent = elapsed ? elapsed+'ms' : '';
    if (rb) { rb.textContent=rows.length>99?'99+':rows.length; rb.classList.add('visible'); }
    if (hs) hs.innerHTML = '<strong>'+rows.length+'</strong> produto'+(rows.length!==1?'s':'')+' encontrado'+(rows.length!==1?'s':'');

    if (INV.viewMode === 'group') {
      INV.renderGroupView(sorted, INV.lastTerms);
    } else {
      var list = INV.buildItemsList(sorted, INV.lastTerms);
      var content = qs('#content');
      if (content) { content.innerHTML=''; content.appendChild(list); }
    }
  },

  buildItemsList: function(items, terms) {
    var list = document.createElement('div');
    list.className = 'items-list view-'+INV.viewMode;
    var frag = document.createDocumentFragment();
    items.forEach(function(row,i) { frag.appendChild(INV.buildItem(row,terms,i)); });
    list.appendChild(frag);
    return list;
  },

  buildItem: function(row, terms, idx) {
    var el = document.createElement('div');
    el.className = 'item';
    el.setAttribute('tabindex','0');
    el.setAttribute('role','button');
    el.setAttribute('aria-label','Copiar '+(row.produto||''));
    el.style.animationDelay = (idx*40)+'ms';
    el.innerHTML =
      '<div class="item-icon"><svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>'+
      '<div class="item-info">'+
        '<div class="produto">'+highlight(row.produto||'',terms)+'</div>'+
        '<div class="caixa-badge"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'+escHtml(row.caixa||'Sem caixa')+'</div>'+
      '</div>';

    function copyItem() {
      var text = (row.produto||'')+(row.caixa?' | '+row.caixa:'');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
          showToast('Copiado: '+(row.produto||''), 'copy');
        }).catch(function(){ showToast('Não foi possível copiar','err'); });
      } else {
        var ta = document.createElement('textarea');
        ta.value=text; ta.style.cssText='position:fixed;opacity:0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showToast('Copiado: '+(row.produto||''),'copy'); }
        catch(e){ showToast('Não foi possível copiar','err'); }
        if (ta.parentNode) ta.parentNode.removeChild(ta);
      }
    }
    el.addEventListener('click', copyItem);
    el.addEventListener('keydown', function(e) {
      if (e.key==='Enter') copyItem();
      if (e.key==='ArrowDown') { e.preventDefault(); INV.moveFocus(1); }
      if (e.key==='ArrowUp')   { e.preventDefault(); INV.moveFocus(-1); }
    });
    return el;
  },

  renderGroupView: function(items, terms) {
    var groups = {};
    items.forEach(function(r) { var k=r.caixa||'Sem caixa'; if(!groups[k])groups[k]=[]; groups[k].push(r); });
    var content = qs('#content'); if (!content) return;
    content.innerHTML = '';
    var frag = document.createDocumentFragment(), globalIdx = 0;
    Object.keys(groups).sort().forEach(function(caixa) {
      var gi = groups[caixa];
      var section = document.createElement('div'); section.className='group-section';
      var header = document.createElement('div'); header.className='group-header';
      header.innerHTML = '<span>'+escHtml(caixa)+' <span style="font-weight:400;font-size:11px;opacity:.7">('+gi.length+')</span></span><svg class="group-chevron open" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>';
      var body = document.createElement('div'); body.className='group-body';
      var list = document.createElement('div'); list.className='items-list view-list';
      var f2 = document.createDocumentFragment();
      gi.forEach(function(r) { f2.appendChild(INV.buildItem(r,terms,globalIdx++)); });
      list.appendChild(f2);
      var collapsed = false;
      header.addEventListener('click', function() {
        collapsed = !collapsed;
        body.style.maxHeight = collapsed?'0':''; body.style.overflow = collapsed?'hidden':'';
        header.querySelector('.group-chevron').classList.toggle('open',!collapsed);
      });
      body.appendChild(list); section.appendChild(header); section.appendChild(body);
      frag.appendChild(section);
    });
    content.appendChild(frag);
  },

  moveFocus: function(dir) {
    var items = qsa('.item'); if (!items.length) return;
    INV.focusedIndex += dir;
    if (INV.focusedIndex < -1) INV.focusedIndex = items.length-1;
    if (INV.focusedIndex >= items.length) INV.focusedIndex = 0;
    if (INV.focusedIndex === -1) {
      var sb = qs('#searchBox'); if (sb) sb.focus();
      items.forEach(function(it){ it.classList.remove('item--focused'); });
    } else {
      items.forEach(function(it,i){ it.classList.toggle('item--focused', i===INV.focusedIndex); });
      items[INV.focusedIndex].focus();
    }
  },

  showState: function(state, msg) {
    var c = qs('#content'); if (!c) return;
    var tpl = {
      hint: '<div class="state-box state-hint"><div class="state-icon"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#7986cb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="state-title">Busque no inventário</div><div class="state-desc">Digite ao menos 2 caracteres. Use <strong>+</strong> para combinar termos. Pressione <span class="kbd">?</span> para atalhos.</div></div>',
      min:  '<div class="state-box state-min"><div class="state-icon"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#ccc" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="state-title">Continue digitando…</div><div class="state-desc">São necessários ao menos 2 caracteres.</div></div>',
      empty:'<div class="state-box state-empty"><div class="state-icon"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#ffb300" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="state-title">Nenhum produto encontrado</div><div class="state-desc">Tente outros termos ou verifique a ortografia.</div></div>',
      err:  '<div class="state-box state-empty"><div class="state-icon"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#e53935" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="state-title">Erro na busca</div><div class="state-desc">'+escHtml(msg||'Ocorreu um erro.')+'</div></div>'
    };
    c.innerHTML = tpl[state] || tpl.hint;
  },

  showSkeleton: function(n) {
    var c = qs('#content'); if (!c) return;
    var sk = document.createElement('div'); sk.className='skeleton-list';
    var f = document.createDocumentFragment();
    for (var i=0;i<n;i++) {
      var item = document.createElement('div'); item.className='skeleton-item';
      item.innerHTML='<div class="skel-icon shimmer"></div><div class="skel-body"><div class="skel-line shimmer" style="width:'+(55+Math.random()*35).toFixed(0)+'%"></div><div class="skel-line short shimmer"></div></div>';
      f.appendChild(item);
    }
    sk.appendChild(f); c.innerHTML=''; c.appendChild(sk);
  },

  exportCSV: function() {
    if (!INV.lastResults||!INV.lastResults.length) { showToast('Nada para exportar','err'); return; }
    var rows = [['Produto','Caixa']].concat(INV.lastResults.map(function(r) {
      return ['"'+(r.produto||'').replace(/"/g,'""')+'"', '"'+(r.caixa||'').replace(/"/g,'""')+'"'];
    }));
    var csv = '\uFEFF'+rows.map(function(r){return r.join(',');}).join('\r\n');
    var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href=url; a.download='inventario.csv'; a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ if(a.parentNode)a.parentNode.removeChild(a); URL.revokeObjectURL(url); },1000);
    showToast('CSV exportado ('+INV.lastResults.length+' itens)','ok');
  },

  shareSearch: function() {
    var sb = qs('#searchBox'), term = sb?sb.value.trim():'';
    if (!term) { showToast('Digite um termo para compartilhar','err'); return; }
    var url = window.location.href.split('#')[0]+'#q='+encodeURIComponent(term);
    if (navigator.clipboard&&navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function(){ showToast('URL copiada','copy'); });
    } else {
      showToast('URL: '+url,'copy');
    }
  },

  animateCount: function(el, target) {
    var start = Date.now(), dur = 500;
    function step() {
      var p = Math.min((Date.now()-start)/dur,1), ease=1-Math.pow(1-p,3);
      el.textContent = Math.round(ease*target);
      if (p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },

  fireConfetti: function() {
    var canvas=qs('#confetti-canvas');
    var W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight;
    var ctx=canvas.getContext('2d');
    var colors=['#43a047','#1565c0','#c2185b','#f9a825','#00838f','#6a1b9a'];
    var p=[];
    for (var i=0;i<80;i++) p.push({x:Math.random()*W,y:-10-Math.random()*60,r:4+Math.random()*5,d:1.5+Math.random()*2.5,color:colors[Math.floor(Math.random()*colors.length)],ta:0,ts:.1+Math.random()*.1,shape:Math.random()>.5?'rect':'circle'});
    var frame=0;
    function draw() {
      ctx.clearRect(0,0,W,H);
      p.forEach(function(q){q.ta+=q.ts;q.y+=q.d;q.x+=Math.sin(q.ta)*1.2;ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.ta);ctx.fillStyle=q.color;ctx.globalAlpha=Math.max(0,1-q.y/H);if(q.shape==='rect'){ctx.fillRect(-q.r/2,-q.r/2,q.r,q.r*.5);}else{ctx.beginPath();ctx.arc(0,0,q.r/2,0,Math.PI*2);ctx.fill();}ctx.restore();});
      if (++frame<140) requestAnimationFrame(draw); else ctx.clearRect(0,0,W,H);
    }
    draw();
  },

  init: function() {
    var sb=qs('#searchBox'), gs=qs('#ghostSuggestion');
    var clearBtn=qs('#clearBtn'), toolbar=qs('#toolbar');
    var termPillsWrap=qs('#termPillsWrap'), resultBadge=qs('#resultBadge'), heroSub=qs('#heroSub');
    if (!sb) return;

    sb.addEventListener('input', function() {
      var val=sb.value;
      if (clearBtn) clearBtn.classList.toggle('visible',val.length>0);
      INV.updateGhostSuggestion(val);
      if (val.length>=2) { INV.triggerSearch(val); }
      else if (val.length===0) {
        INV.showState('hint');
        if (toolbar) toolbar.classList.remove('visible');
        if (resultBadge) resultBadge.classList.remove('visible');
        if (heroSub) heroSub.textContent='Pesquise pelo nome ou código do produto';
        if (termPillsWrap) termPillsWrap.classList.remove('open');
      } else {
        INV.showState('min');
        if (toolbar) toolbar.classList.remove('visible');
      }
    });

    sb.addEventListener('keydown', function(e) {
      if (e.key==='Tab') {
        var ghost=gs?gs.textContent:'';
        if (ghost) { e.preventDefault(); sb.value=ghost; if(gs)gs.textContent=''; INV.triggerSearch(ghost,true); }
      }
      if (e.key==='ArrowDown') { e.preventDefault(); INV.moveFocus(1); }
      if (e.key==='Escape') {
        if (sb.value) {
          sb.value=''; if(clearBtn)clearBtn.classList.remove('visible');
          if(gs)gs.textContent=''; var gh=qs('#ghostHint');if(gh)gh.innerHTML='';
          INV.showState('hint');
          if(toolbar)toolbar.classList.remove('visible');
          if(resultBadge)resultBadge.classList.remove('visible');
          if(termPillsWrap)termPillsWrap.classList.remove('open');
        }
      }
    });

    if (clearBtn) clearBtn.addEventListener('click', function() {
      sb.value=''; clearBtn.classList.remove('visible');
      if(gs)gs.textContent=''; var gh=qs('#ghostHint');if(gh)gh.innerHTML='';
      INV.showState('hint');
      if(toolbar)toolbar.classList.remove('visible');
      if(resultBadge)resultBadge.classList.remove('visible');
      if(termPillsWrap)termPillsWrap.classList.remove('open');
      sb.focus();
    });

    // View toggles
    var viewBtns = {list:qs('#viewList'),grid:qs('#viewGrid'),group:qs('#viewGroup')};
    Object.keys(viewBtns).forEach(function(k) {
      var btn=viewBtns[k]; if(!btn) return;
      btn.classList.toggle('active',k===INV.viewMode);
      btn.addEventListener('click',function(){
        INV.viewMode=k; localStorage.setItem('inv_view',k);
        Object.keys(viewBtns).forEach(function(j){if(viewBtns[j])viewBtns[j].classList.toggle('active',j===k);});
        INV.renderResults(INV.lastResults, INV.lastTerms);
      });
    });

    // Sort
    var sortSel=qs('#sortSelect');
    if (sortSel) {
      sortSel.value=INV.sortMode;
      sortSel.addEventListener('change',function(){
        INV.sortMode=sortSel.value; localStorage.setItem('inv_sort',INV.sortMode);
        INV.renderResults(INV.lastResults, INV.lastTerms);
      });
    }

    var exportBtn=qs('#exportBtn'); if(exportBtn) exportBtn.addEventListener('click',INV.exportCSV);
    var printBtn=qs('#printBtn');   if(printBtn)  printBtn.addEventListener('click',function(){window.print();});
    var shareBtn=qs('#shareBtn');   if(shareBtn)  shareBtn.addEventListener('click',INV.shareSearch);
    var clearAllBtn=qs('#clearAllBtn'); if(clearAllBtn) clearAllBtn.addEventListener('click',INV.clearAllRecents);

    INV.renderRecentsChips();
    INV.showState('hint');

    // Hash search
    var hash=window.location.hash;
    if (hash && hash.startsWith('#q=')) {
      var term=decodeURIComponent(hash.slice(3));
      if (term.length>=2) { sb.value=term; if(clearBtn)clearBtn.classList.add('visible'); INV.triggerSearch(term,true); }
    }
  },

  destroy: function() { clearTimeout(INV.debounceTimer); }
};

/* ═══════════════════════════════════════════════════════════
   PAGES.VALIDADE
   ═══════════════════════════════════════════════════════════ */
var VAL = {
  data: null,
  filtered: [],
  filterQuery: '',
  filterStatus: 'all',
  sortMode: localStorage.getItem('val_sort') || 'nearest',
  debounceTimer: null,

  loadData: function(forceRefresh) {
    if (!forceRefresh) {
      try {
        var raw=sessionStorage.getItem('validade_cache');
        if (raw) {
          VAL.data=JSON.parse(raw);
          VAL.updateSummary(); VAL.applyFilters();
          var ld=qs('#valLoading'),gd=qs('#valGrid');
          if(ld)ld.style.display='none'; if(gd)gd.style.display='';
          return;
        }
      } catch(e) {}
    }
    var ld=qs('#valLoading'),gd=qs('#valGrid'),er=qs('#valError');
    if(ld)ld.style.display=''; if(gd)gd.style.display='none'; if(er)er.style.display='none';

    google.script.run
      .withSuccessHandler(function(rows) {
        try { sessionStorage.setItem('validade_cache',JSON.stringify(rows||[])); } catch(e) {}
        VAL.data=rows||[];
        if(ld)ld.style.display='none'; if(gd)gd.style.display='';
        VAL.updateSummary(); VAL.applyFilters();
      })
      .withFailureHandler(function(err) {
        if(ld)ld.style.display='none';
        if(er) {
          er.style.display='';
          er.innerHTML='<div class="state-box state-empty"><div class="state-icon"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#e53935" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="state-title">Erro ao carregar dados</div><div class="state-desc">'+escHtml(err&&err.message?err.message:'Erro desconhecido.')+'<br><br><button class="val-refresh-btn" id="valRetryBtn" style="margin:0 auto"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.25"/></svg>Tentar novamente</button></div></div>';
          var rb=qs('#valRetryBtn'); if(rb) rb.addEventListener('click',function(){VAL.loadData(true);});
        }
        showToast('Erro ao carregar validades','err');
      })
      .getValidadeData();
  },

  updateSummary: function() {
    if (!VAL.data) return;
    var total=VAL.data.length;
    var atencao=VAL.data.filter(function(r){return r.diasRestantes>=0&&r.diasRestantes<=90;}).length;
    var critico=VAL.data.filter(function(r){return r.diasRestantes<0;}).length;
    var te=qs('#valSumTotal'),ae=qs('#valSumAtencao'),ce=qs('#valSumCritico');
    if(te)te.textContent=total; if(ae)ae.textContent=atencao; if(ce)ce.textContent=critico;
  },

  applyFilters: function() {
    if (!VAL.data) return;
    var q=VAL.filterQuery.toLowerCase().trim(), st=VAL.filterStatus;
    var result=VAL.data.filter(function(r) {
      if (q&&q.length>=2&&r.produto.toLowerCase().indexOf(q)===-1) return false;
      if (st!=='all') {
        var s=(r.status||'').toLowerCase();
        if (st==='ok'&&s!=='ok') return false;
        if (st==='atencao'&&s.indexOf('aten')===-1) return false;
        if (st==='critico'&&s.indexOf('cr')===-1) return false;
        if (st==='vencido'&&s!=='vencido') return false;
      }
      return true;
    });
    var sm=VAL.sortMode;
    result=result.slice().sort(function(a,b) {
      if (sm==='nearest'||sm==='days') return a.diasRestantes-b.diasRestantes;
      if (sm==='farthest') return b.diasRestantes-a.diasRestantes;
      if (sm==='name') return (a.produto||'').localeCompare(b.produto||'');
      return 0;
    });
    VAL.filtered=result;
    VAL.renderCards(); VAL.updateCountBar();
  },

  updateCountBar: function() {
    var el=qs('#valCountBar');
    if(el) el.innerHTML='Mostrando <strong>'+VAL.filtered.length+'</strong> de <strong>'+(VAL.data?VAL.data.length:0)+'</strong> produtos';
  },

  getDiasClass: function(dias) {
    if (dias<30) return 'dias-crit';
    if (dias<=90) return 'dias-warn';
    return 'dias-ok';
  },

  getStatusClass: function(status) {
    var s=(status||'').toLowerCase();
    if (s==='ok') return 'badge-ok';
    if (s==='vencido'||s.indexOf('cr')!==-1) return 'badge-crit';
    return 'badge-warn';
  },

  renderCards: function() {
    var grid=qs('#valGrid'); if(!grid) return;
    if (!VAL.filtered.length) {
      grid.innerHTML='<div class="state-box state-empty" style="grid-column:1/-1"><div class="state-icon"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#ffb300" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="state-title">Nenhum produto encontrado</div><div class="state-desc">Tente outros filtros.</div></div>';
      return;
    }
    var frag=document.createDocumentFragment();
    VAL.filtered.forEach(function(r,i) {
      var card=document.createElement('div'); card.className='val-card';
      card.style.animationDelay=Math.min(i*30,300)+'ms';
      var dias=r.diasRestantes;
      var diasClass=VAL.getDiasClass(dias);
      var diasLabel=dias<0?'Vencido há '+Math.abs(dias)+'d':dias+'d restantes';
      var badges='';
      if (r.status) badges+='<span class="badge '+VAL.getStatusClass(r.status)+'">'+escHtml(r.status)+'</span>';
      if (r.estoque) {
        var ec=r.estoque.toUpperCase()==='TEMOS'?'badge-temos':'badge-falta';
        badges+='<span class="badge '+ec+'">'+escHtml(r.estoque)+'</span>';
      }
      if (r.precisaProduzir&&r.precisaProduzir.toUpperCase()!=='NÃO'&&r.precisaProduzir!=='') {
        badges+='<span class="badge badge-produzir">Produzir: '+escHtml(r.precisaProduzir)+'</span>';
      }
      var obs=r.observacao?'<div class="val-obs">'+escHtml(r.observacao)+'</div>':'';
      var loteEta=(r.lote?'Lote '+escHtml(r.lote):'')+(r.lote&&r.etiqueta?' · ':'')+(r.etiqueta?'Etiq. '+escHtml(r.etiqueta):'');
      card.innerHTML=
        '<div class="val-card-header">'+
          '<div class="val-prod-name">'+escHtml(r.produto)+'</div>'+
          '<span class="val-dias-badge '+diasClass+'">'+escHtml(diasLabel)+'</span>'+
        '</div>'+
        '<div class="val-date">'+escHtml(fmtDate(r.validade)||r.validade)+'</div>'+
        (loteEta?'<div class="val-lote-eta">'+loteEta+'</div>':'')+
        (badges?'<div class="val-badges">'+badges+'</div>':'')+
        obs;
      frag.appendChild(card);
    });
    grid.innerHTML=''; grid.appendChild(frag);
  },

  init: function() {
    var fi=qs('#valFilterInput');
    if(fi) fi.addEventListener('input',function(){
      clearTimeout(VAL.debounceTimer);
      VAL.debounceTimer=setTimeout(function(){ VAL.filterQuery=fi.value; VAL.applyFilters(); },280);
    });

    var ss=qs('#valSortSelect');
    if(ss){ ss.value=VAL.sortMode; ss.addEventListener('change',function(){ VAL.sortMode=ss.value; localStorage.setItem('val_sort',VAL.sortMode); VAL.applyFilters(); }); }

    var ts=qs('#valStatusSelect');
    if(ts) ts.addEventListener('change',function(){ VAL.filterStatus=ts.value; VAL.applyFilters(); });

    var rb=qs('#valRefreshBtn');
    if(rb) rb.addEventListener('click',function(){
      try{sessionStorage.removeItem('validade_cache');}catch(e){}
      VAL.data=null; VAL.loadData(true); showToast('Atualizando dados…','ok');
    });

    VAL.loadData(false);
  },

  destroy: function() { clearTimeout(VAL.debounceTimer); }
};

              '<button class="small-btn" id="printBtn"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Imprimir</button>'+
            '</div>'+

/* ═══════════════════════════════════════════════════════════
   SCROLL TO TOP
   ═══════════════════════════════════════════════════════════ */
var scrollTopBtn = qs('#scrollTop');
window.addEventListener('scroll', function() {
  if (scrollTopBtn) scrollTopBtn.classList.toggle('visible', window.scrollY > 200);
});
if (scrollTopBtn) scrollTopBtn.addEventListener('click', function() { window.scrollTo({top:0,behavior:'smooth'}); });

/* ═══════════════════════════════════════════════════════════
   GLOBAL KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  var tag=(e.target||{}).tagName;
  var inInput=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';

  if (e.ctrlKey&&e.key==='d') { e.preventDefault(); APP.applyTheme(APP.theme==='light'?'dark':'light'); showToast(APP.theme==='dark'?'Tema escuro':'Tema claro','ok'); return; }
  if (e.ctrlKey&&e.key==='e') { e.preventDefault(); if(ROUTER.currentPage==='inventario') INV.exportCSV(); return; }
  if (!inInput&&e.key==='1') { ROUTER.navigate('inventario'); return; }
  if (!inInput&&e.key==='2') { ROUTER.navigate('validade'); return; }
  if (!inInput&&e.key==='?') { e.preventDefault(); SHORTCUTS.open(); return; }
  if (!inInput&&e.key==='/') {
    e.preventDefault();
    if (ROUTER.currentPage!=='inventario') { ROUTER.navigate('inventario'); return; }
    var sb=qs('#searchBox'); if(sb) sb.focus();
    return;
  }
  if (e.key==='Escape') {
    if (SHORTCUTS.isOpen()) { SHORTCUTS.close(); return; }
    if (SIDEBAR.isOpen) { SIDEBAR.close(); return; }
  }
  if (!inInput&&e.key==='ArrowUp'&&ROUTER.currentPage==='inventario') { e.preventDefault(); INV.moveFocus(-1); }
});

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
APP.applyTheme(APP.theme);
APP.applyDensity(APP.density);
APP.applyHC(APP.hc);
SIDEBAR.init();

var initHash = window.location.hash;
var initPage = 'inventario';
if (initHash === '#validade') initPage = 'validade';

ROUTER.navigate(initPage);

// If hash has search term and we're on inventario, it's handled inside INV.init()

})();
</script>
