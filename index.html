<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px 60px;
    }

    .container { width: 100%; max-width: 640px; }

    /* Card */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      padding: 28px 24px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .header-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(46,125,50,0.3);
    }

    .header-icon svg {
      width: 22px; height: 22px;
      fill: none; stroke: #fff;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .title { font-size: 21px; font-weight: 700; color: #1b5e20; letter-spacing: -0.3px; }
    .subtitle { font-size: 12.5px; color: #999; margin-top: 3px; }

    .kbd {
      display: inline-flex; align-items: center;
      background: #f5f5f5; border: 1px solid #d8d8d8; border-bottom-width: 2px;
      border-radius: 4px; padding: 1px 6px;
      font-size: 11px; font-family: monospace; color: #555; line-height: 1.6;
    }

    /* Search */
    .search-wrapper { position: relative; margin-bottom: 12px; }

    .search-icon {
      position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
      width: 17px; height: 17px; pointer-events: none; color: #bbb;
    }

    .search-box {
      width: 100%;
      padding: 14px 44px 14px 44px;
      font-size: 15px;
      border-radius: 12px;
      border: 1.5px solid #e2e2e2;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f7f8fa;
      color: #222;
    }

    .search-box::placeholder { color: #c0c0c0; }

    .search-box:focus {
      background: #fff;
      border-color: #43a047;
      box-shadow: 0 0 0 3px rgba(67,160,71,0.14);
    }

    .clear-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: #e8e8e8; border: none; cursor: pointer; color: #888;
      width: 24px; height: 24px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .clear-btn:hover { background: #d8d8d8; color: #444; }
    .clear-btn.visible { display: flex; }

    /* Recent chips */
    .recents-wrap { margin-bottom: 16px; min-height: 0; }

    .recents-label {
      font-size: 11px; color: #bbb; font-weight: 500; letter-spacing: 0.3px;
      text-transform: uppercase; margin-bottom: 7px;
    }

    .recents {
      display: flex; flex-wrap: wrap; gap: 6px;
    }

    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: #f1f8f1; border: 1px solid #c8e6c9;
      border-radius: 20px; padding: 4px 8px 4px 8px;
      font-size: 12px; color: #2e7d32;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      line-height: 1;
    }

    .chip:hover { background: #e0f2e1; border-color: #a5d6a7; }

    .chip-icon { flex-shrink: 0; opacity: 0.6; }

    .chip-text { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .chip-remove {
      background: none; border: none; cursor: pointer;
      color: #81c784; padding: 0; margin-left: 1px;
      display: flex; align-items: center;
      border-radius: 50%; width: 14px; height: 14px;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .chip-remove:hover { color: #2e7d32; background: rgba(46,125,50,0.1); }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      min-height: 20px; margin-bottom: 12px; padding: 0 2px;
    }

    .result-count { font-size: 12.5px; color: #aaa; }
    .result-count strong { color: #43a047; font-weight: 600; }

    .loading { display: none; align-items: center; gap: 7px; font-size: 12.5px; color: #aaa; }
    .loading.visible { display: flex; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid #e0e0e0; border-top-color: #43a047;
      border-radius: 50%; animation: spin 0.65s linear infinite; flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results { display: flex; flex-direction: column; gap: 7px; }

    .item {
      padding: 12px 14px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1.5px solid #ebebeb;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      animation: slideIn 0.18s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover {
      border-color: #a5d6a7;
      box-shadow: 0 3px 10px rgba(46,125,50,0.1);
      transform: translateY(-1px);
    }

    .item-icon {
      width: 34px; height: 34px;
      background: #e8f5e9; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .item-icon svg {
      width: 16px; height: 16px;
      stroke: #2e7d32; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .item-info { flex: 1; min-width: 0; }

    .produto {
      font-size: 14.5px; font-weight: 500; color: #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .produto mark {
      background: #fff59d; color: inherit;
      border-radius: 2px; padding: 0 1px; font-weight: 600;
    }

    .caixa-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #f1f8f1; color: #388e3c;
      border-radius: 5px; padding: 2px 8px;
      font-size: 11.5px; font-weight: 500; margin-top: 4px;
    }

    .caixa-badge svg {
      width: 11px; height: 11px;
      stroke: #388e3c; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* States */
    .empty, .hint {
      padding: 40px 20px;
      text-align: center;
    }

    .state-icon {
      margin: 0 auto 14px;
      width: 52px; height: 52px;
      background: #f5f5f5; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    .state-icon svg {
      width: 26px; height: 26px;
      stroke: #ccc; fill: none;
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
    }

    .state-title { font-size: 14px; font-weight: 500; color: #bbb; margin-bottom: 4px; }
    .state-sub { font-size: 12.5px; color: #ccc; }

    /* Error */
    .error {
      padding: 14px 16px;
      background: #fff5f5; border: 1.5px solid #ffcdd2;
      border-radius: 10px; color: #c62828;
      font-size: 13.5px;
      display: flex; align-items: flex-start; gap: 10px;
    }

    .error svg { flex-shrink: 0; margin-top: 1px; }

    /* Min chars hint */
    .min-chars {
      text-align: center; font-size: 12.5px; color: #ccc; padding: 32px 0;
    }

    /* Keyboard hint in subtitle */
    .shortcut-hint { opacity: 0.7; }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="header">
        <div class="header-icon">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
            <line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </div>
        <div>
          <div class="title">Busca de Inventário</div>
          <div class="subtitle">
            Use <span class="kbd">+</span> para combinar termos
            &nbsp;·&nbsp; <span class="kbd shortcut-hint">/</span> para focar
            &nbsp;·&nbsp; mín. 2 caracteres
          </div>
        </div>
      </div>

      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>

        <input
          id="search"
          class="search-box"
          type="text"
          placeholder="Ex: mirra + roll on"
          autocomplete="off"
          spellcheck="false"
          autofocus
        >

        <button class="clear-btn" id="clearBtn" title="Limpar" aria-label="Limpar busca">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="recents-wrap" id="recentsWrap" style="display:none">
        <div class="recents-label">Buscas recentes</div>
        <div class="recents" id="recents"></div>
      </div>

      <div class="status-bar">
        <div class="result-count" id="resultCount"></div>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          Buscando…
        </div>
      </div>

      <div id="results"></div>

    </div>
  </div>

  <script>
    const RECENTS_KEY = "inv_recents";
    const MAX_RECENTS = 6;

    let debounceTimer = null;

    const searchInput = document.getElementById("search");
    const clearBtn    = document.getElementById("clearBtn");
    const resultsEl   = document.getElementById("results");
    const loadingEl   = document.getElementById("loading");
    const countEl     = document.getElementById("resultCount");
    const recentsEl   = document.getElementById("recents");
    const recentsWrap = document.getElementById("recentsWrap");

    // ── Keyboard shortcuts ────────────────────────────────────────────────────
    document.addEventListener("keydown", function(e) {
      if (e.key === "/" && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
      if (e.key === "Escape" && document.activeElement === searchInput) {
        searchInput.blur();
      }
    });

    // ── Search input events ───────────────────────────────────────────────────
    searchInput.addEventListener("input", onInput);
    clearBtn.addEventListener("click", clearSearch);

    function onInput() {
      const termo = searchInput.value;
      clearBtn.classList.toggle("visible", termo.length > 0);
      clearTimeout(debounceTimer);

      if (!termo.trim()) { showHint(); return; }
      if (termo.trim().length < 2) { showMinChars(); return; }

      debounceTimer = setTimeout(function() { buscar(termo); }, 300);
    }

    function clearSearch() {
      searchInput.value = "";
      clearBtn.classList.remove("visible");
      showHint();
      searchInput.focus();
    }

    // ── Recent searches ───────────────────────────────────────────────────────
    function getRecents() {
      try { return JSON.parse(localStorage.getItem(RECENTS_KEY)) || []; }
      catch(e) { return []; }
    }

    function saveRecent(termo) {
      var t = termo.trim();
      if (!t || t.length < 2) return;
      var recents = getRecents().filter(function(r) { return r !== t; });
      recents.unshift(t);
      recents = recents.slice(0, MAX_RECENTS);
      localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
      renderRecents();
    }

    function removeRecent(termo) {
      var recents = getRecents().filter(function(r) { return r !== termo; });
      localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
      renderRecents();
    }

    function renderRecents() {
      var recents = getRecents();
      recentsEl.innerHTML = "";
      if (!recents.length) { recentsWrap.style.display = "none"; return; }
      recentsWrap.style.display = "block";

      recents.forEach(function(r) {
        var chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";

        var iconEl = document.createElement("span");
        iconEl.className = "chip-icon";
        iconEl.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

        var textEl = document.createElement("span");
        textEl.className = "chip-text";
        textEl.textContent = r;

        var removeBtn = document.createElement("button");
        removeBtn.className = "chip-remove";
        removeBtn.type = "button";
        removeBtn.setAttribute("aria-label", "Remover busca");
        removeBtn.innerHTML = '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        removeBtn.addEventListener("click", function(e) {
          e.stopPropagation();
          removeRecent(r);
        });

        chip.addEventListener("click", function() {
          searchInput.value = r;
          clearBtn.classList.add("visible");
          buscar(r);
        });

        chip.appendChild(iconEl);
        chip.appendChild(textEl);
        chip.appendChild(removeBtn);
        recentsEl.appendChild(chip);
      });
    }

    // ── API call ──────────────────────────────────────────────────────────────
    function buscar(termo) {
      setLoading(true);
      countEl.textContent = "";
      google.script.run
        .withSuccessHandler(function(data) { render(data, termo); })
        .withFailureHandler(onError)
        .buscarProdutosWeb(termo);
    }

    // ── Render results ────────────────────────────────────────────────────────
    function render(data, termo) {
      setLoading(false);
      resultsEl.innerHTML = "";

      if (!data || data.length === 0) {
        countEl.textContent = "";
        resultsEl.appendChild(buildState("empty"));
        return;
      }

      saveRecent(termo);

      var total = data.length;
      countEl.innerHTML = "<strong>" + total + "</strong> produto" + (total !== 1 ? "s" : "") + " encontrado" + (total !== 1 ? "s" : "");

      var palavras = termo.toLowerCase().split("+").map(function(p) { return p.trim(); }).filter(Boolean);
      var fragment = document.createDocumentFragment();

      data.forEach(function(item, i) {
        var div = document.createElement("div");
        div.className = "item";
        div.style.animationDelay = (i * 30) + "ms";

        var iconWrap = document.createElement("div");
        iconWrap.className = "item-icon";
        iconWrap.innerHTML = '<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>';

        var info = document.createElement("div");
        info.className = "item-info";

        var nome = document.createElement("div");
        nome.className = "produto";
        nome.innerHTML = highlight(item.produto, palavras);

        var badge = document.createElement("div");
        badge.className = "caixa-badge";
        badge.innerHTML = '<svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>';
        badge.appendChild(document.createTextNode(item.caixa));

        info.appendChild(nome);
        info.appendChild(badge);
        div.appendChild(iconWrap);
        div.appendChild(info);
        fragment.appendChild(div);
      });

      resultsEl.appendChild(fragment);
    }

    function highlight(text, palavras) {
      var safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      palavras.forEach(function(p) {
        if (!p) return;
        var re = new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
        safe = safe.replace(re, function(m) { return "<mark>" + m + "</mark>"; });
      });
      return safe;
    }

    // ── Error handler ─────────────────────────────────────────────────────────
    function onError(err) {
      setLoading(false);
      countEl.textContent = "";
      resultsEl.innerHTML = "";
      var errDiv = document.createElement("div");
      errDiv.className = "error";
      errDiv.innerHTML =
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<circle cx="12" cy="12" r="10"/>' +
          '<line x1="12" y1="8" x2="12" y2="12"/>' +
          '<line x1="12" y1="16" x2="12.01" y2="16"/>' +
        '</svg>';
      var msg = document.createElement("span");
      msg.textContent = "Erro ao buscar. Verifique sua conexão e tente novamente.";
      errDiv.appendChild(msg);
      resultsEl.appendChild(errDiv);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function setLoading(on) { loadingEl.classList.toggle("visible", on); }

    function showHint() {
      countEl.textContent = "";
      resultsEl.innerHTML = "";
      resultsEl.appendChild(buildState("hint"));
    }

    function showMinChars() {
      countEl.textContent = "";
      resultsEl.innerHTML = "";
      var el = document.createElement("div");
      el.className = "min-chars";
      el.textContent = "Digite ao menos 2 caracteres\u2026";
      resultsEl.appendChild(el);
    }

    function buildState(type) {
      var el = document.createElement("div");
      el.className = type;

      var icon = document.createElement("div");
      icon.className = "state-icon";

      var title = document.createElement("div");
      title.className = "state-title";

      var sub = document.createElement("div");
      sub.className = "state-sub";

      if (type === "hint") {
        icon.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
        title.textContent = "Busca de Inventário";
        sub.textContent = "Digite o nome do produto para localizar";
      } else {
        icon.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';
        title.textContent = "Nenhum produto encontrado";
        sub.textContent = "Tente outros termos ou verifique a grafia";
      }

      el.appendChild(icon);
      el.appendChild(title);
      el.appendChild(sub);
      return el;
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    renderRecents();
    showHint();
  </script>
</body>
</html>
