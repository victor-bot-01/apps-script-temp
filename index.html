<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f4f6f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px 40px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: #2e7d32;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #1b5e20;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    /* Search */
    .search-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      pointer-events: none;
      color: #aaa;
    }

    .search-box {
      width: 100%;
      padding: 16px 48px 16px 46px;
      font-size: 16px;
      border-radius: 12px;
      border: 1.5px solid #e0e0e0;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      background: #fff;
      color: #333;
    }

    .search-box::placeholder {
      color: #bbb;
    }

    .search-box:focus {
      border-color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46,125,50,0.12);
    }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 4px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .clear-btn:hover {
      color: #666;
      background: #f0f0f0;
    }

    .clear-btn.visible {
      display: flex;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      min-height: 22px;
    }

    .result-count {
      font-size: 13px;
      color: #888;
    }

    .result-count strong {
      color: #2e7d32;
    }

    /* Loading */
    .loading {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }

    .loading.visible {
      display: flex;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #e0e0e0;
      border-top-color: #2e7d32;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Results */
    .results {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      padding: 14px 18px;
      border-radius: 10px;
      background: #fff;
      border: 1.5px solid #e8e8e8;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .item:hover {
      border-color: #a5d6a7;
      box-shadow: 0 2px 8px rgba(46,125,50,0.08);
      transform: translateY(-1px);
    }

    .item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .produto {
      font-size: 15px;
      font-weight: 500;
      color: #1b5e20;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .caixa-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 4px;
    }

    /* Empty */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: #aaa;
      border: 1.5px dashed #e0e0e0;
      border-radius: 12px;
      background: #fafafa;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .empty p {
      font-size: 14px;
    }

    /* Error */
    .error {
      padding: 14px 18px;
      background: #fff3f3;
      border: 1.5px solid #ffcdd2;
      border-radius: 10px;
      color: #c62828;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Hint */
    .hint {
      padding: 40px 20px;
      text-align: center;
      color: #bbb;
      font-size: 14px;
    }

    .hint-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .tag {
      display: inline-block;
      background: #f1f8f1;
      border: 1px solid #c8e6c9;
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 12px;
      color: #2e7d32;
      margin: 2px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div>
        <div class="title">Busca de Inventário</div>
        <div class="subtitle">Use <span class="tag">+</span> para combinar termos</div>
      </div>
    </div>

    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>

      <input
        id="search"
        class="search-box"
        type="text"
        placeholder="Ex: mirra + roll on"
        autocomplete="off"
        spellcheck="false"
      >

      <button class="clear-btn" id="clearBtn" title="Limpar busca" aria-label="Limpar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="status-bar">
      <div class="result-count" id="resultCount"></div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        Buscando…
      </div>
    </div>

    <div id="results"></div>

  </div>

  <script>
    let timeout = null;

    const searchInput = document.getElementById("search");
    const clearBtn    = document.getElementById("clearBtn");
    const resultsEl   = document.getElementById("results");
    const loadingEl   = document.getElementById("loading");
    const countEl     = document.getElementById("resultCount");

    searchInput.addEventListener("input", onInput);
    clearBtn.addEventListener("click", clearSearch);

    function onInput() {
      const termo = searchInput.value;

      clearBtn.classList.toggle("visible", termo.length > 0);

      clearTimeout(timeout);

      if (!termo.trim()) {
        showHint();
        return;
      }

      timeout = setTimeout(() => buscar(termo), 300);
    }

    function clearSearch() {
      searchInput.value = "";
      clearBtn.classList.remove("visible");
      showHint();
      searchInput.focus();
    }

    function buscar(termo) {
      setLoading(true);
      countEl.textContent = "";

      google.script.run
        .withSuccessHandler(render)
        .withFailureHandler(onError)
        .buscarProdutosWeb(termo);
    }

    function render(data) {
      setLoading(false);
      resultsEl.innerHTML = "";

      if (!data || data.length === 0) {
        countEl.textContent = "";
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = '<div class="empty-icon">🔍</div><p>Nenhum produto encontrado</p>';
        resultsEl.appendChild(empty);
        return;
      }

      countEl.innerHTML = `<strong>${data.length}</strong> produto${data.length !== 1 ? "s" : ""} encontrado${data.length !== 1 ? "s" : ""}`;

      const fragment = document.createDocumentFragment();

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        const dot = document.createElement("div");
        dot.className = "item-dot";

        const info = document.createElement("div");
        info.className = "item-info";

        const nome = document.createElement("div");
        nome.className = "produto";
        nome.textContent = item.produto;

        const badge = document.createElement("span");
        badge.className = "caixa-badge";
        badge.textContent = item.caixa;

        info.appendChild(nome);
        info.appendChild(badge);
        div.appendChild(dot);
        div.appendChild(info);
        fragment.appendChild(div);
      });

      resultsEl.appendChild(fragment);
    }

    function onError(err) {
      setLoading(false);
      countEl.textContent = "";
      resultsEl.innerHTML = "";

      const errDiv = document.createElement("div");
      errDiv.className = "error";
      errDiv.textContent = "⚠️ Erro ao buscar. Verifique sua conexão e tente novamente.";
      resultsEl.appendChild(errDiv);
    }

    function setLoading(on) {
      loadingEl.classList.toggle("visible", on);
    }

    function showHint() {
      countEl.textContent = "";
      resultsEl.innerHTML = "";
      const hint = document.createElement("div");
      hint.className = "hint";
      hint.innerHTML = '<div class="hint-icon">📦</div><p>Digite um produto para buscar no inventário</p>';
      resultsEl.appendChild(hint);
    }

    // Estado inicial
    showHint();
  </script>
</body>
</html>
