<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <style>
    /* ╔══════════════════════════════════════════════════════════════════════════╗
       ║  CSS TOKENS — light / dark                                              ║
       ╚══════════════════════════════════════════════════════════════════════════╝ */
    :root {
      --bg:                  #eef0f3;
      --card:                #ffffff;
      --card-border:         rgba(0,0,0,0.07);
      --text-primary:        #1a1a1a;
      --text-secondary:      #555;
      --text-muted:          #aaa;
      --input-bg:            #f5f6f8;
      --input-border:        #e0e0e0;
      --input-focus-border:  #43a047;
      --input-focus-shadow:  rgba(67,160,71,0.14);
      --item-bg:             #f9fafb;
      --item-border:         #ebebeb;
      --item-hover-border:   #a5d6a7;
      --item-hover-shadow:   rgba(46,125,50,0.12);
      --chip-bg:             #f1f8f1;
      --chip-border:         #c8e6c9;
      --badge-bg:            #f1f8f1;
      --badge-color:         #388e3c;
      --mark-bg:             #fff59d;
      --mark-color:          inherit;
      --scrollbar-thumb:     #c8e6c9;
      --scrollbar-track:     transparent;
      --kbd-bg:              rgba(255,255,255,0.85);
      --kbd-border:          #d0d0d0;
      --toggle-bg:           #ededf0;
      --toggle-color:        #555;
      --divider:             #f0f0f0;
      --shadow-card:         0 2px 4px rgba(0,0,0,0.06),
                             0 8px 28px rgba(0,0,0,0.10),
                             0 32px 72px rgba(0,0,0,0.08);
      --green-deep:          #1b5e20;
      --green-mid:           #2e7d32;
      --green-base:          #43a047;
      --green-light:         #66bb6a;
      --green-pale:          #a5d6a7;
      --state-hint-bg:       #f0f4ff;
      --state-hint-stroke:   #7986cb;
      --state-empty-bg:      #fff8e1;
      --state-empty-stroke:  #ffb300;
      --state-min-bg:        #f5f5f5;
      --state-min-stroke:    #ccc;
      --cube-border:         rgba(67,160,71,0.55);
      --cube-face:           rgba(67,160,71,0.07);
      --hex-stroke:          #2e7d32;
    }

    [data-theme="dark"] {
      --bg:                  #0e1a0f;
      --card:                #162318;
      --card-border:         rgba(255,255,255,0.06);
      --text-primary:        #e8f5e9;
      --text-secondary:      #a5d6a7;
      --text-muted:          #558b5a;
      --input-bg:            #1a2e1c;
      --input-border:        #2d4830;
      --input-focus-border:  #66bb6a;
      --input-focus-shadow:  rgba(102,187,106,0.18);
      --item-bg:             #1a2e1c;
      --item-border:         #2a3d2c;
      --item-hover-border:   #66bb6a;
      --item-hover-shadow:   rgba(102,187,106,0.14);
      --chip-bg:             #1a2e1c;
      --chip-border:         #2d4830;
      --badge-bg:            #1a2e1c;
      --badge-color:         #81c784;
      --mark-bg:             rgba(255,245,0,0.22);
      --mark-color:          #fff59d;
      --scrollbar-thumb:     #2d4830;
      --scrollbar-track:     transparent;
      --kbd-bg:              rgba(255,255,255,0.07);
      --kbd-border:          #3a5a3c;
      --toggle-bg:           #1a2e1c;
      --toggle-color:        #81c784;
      --divider:             #1e3320;
      --shadow-card:         0 2px 4px rgba(0,0,0,0.35),
                             0 8px 28px rgba(0,0,0,0.45),
                             0 32px 72px rgba(0,0,0,0.30);
      --green-deep:          #1b5e20;
      --green-mid:           #2e7d32;
      --green-base:          #43a047;
      --green-light:         #66bb6a;
      --green-pale:          #388e3c;
      --state-hint-bg:       #0f142a;
      --state-hint-stroke:   #9fa8da;
      --state-empty-bg:      #251a00;
      --state-empty-stroke:  #ffc107;
      --state-min-bg:        #1a2e1c;
      --state-min-stroke:    #3a5a3c;
      --cube-border:         rgba(102,187,106,0.50);
      --cube-face:           rgba(102,187,106,0.06);
      --hex-stroke:          #43a047;
    }

    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Scrollbar ──────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar               { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track         { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb         { background: var(--scrollbar-thumb); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover   { background: var(--green-pale); }
    *  { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track); }

    /* ── Body / tela cheia ──────────────────────────────────────────────────── */
    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 16px 80px;
      position: relative;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Hexágonos flutuantes ───────────────────────────────────────────────── */
    .bg-particles {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }

    .hex { position: absolute; opacity: 0; animation: floatHex linear infinite; }
    .hex svg { display: block; }

    .hex:nth-child(1)  { left:  3%; animation-duration: 21s; animation-delay:   0s; width: 38px; }
    .hex:nth-child(2)  { left: 11%; animation-duration: 28s; animation-delay:  -5s; width: 22px; }
    .hex:nth-child(3)  { left: 20%; animation-duration: 17s; animation-delay:  -3s; width: 48px; }
    .hex:nth-child(4)  { left: 31%; animation-duration: 32s; animation-delay: -11s; width: 18px; }
    .hex:nth-child(5)  { left: 43%; animation-duration: 23s; animation-delay:  -7s; width: 34px; }
    .hex:nth-child(6)  { left: 55%; animation-duration: 19s; animation-delay:  -2s; width: 26px; }
    .hex:nth-child(7)  { left: 64%; animation-duration: 26s; animation-delay: -14s; width: 44px; }
    .hex:nth-child(8)  { left: 73%; animation-duration: 30s; animation-delay:  -4s; width: 20px; }
    .hex:nth-child(9)  { left: 82%; animation-duration: 22s; animation-delay:  -9s; width: 36px; }
    .hex:nth-child(10) { left: 90%; animation-duration: 27s; animation-delay:  -1s; width: 16px; }
    .hex:nth-child(11) { left:  7%; animation-duration: 35s; animation-delay: -18s; width: 14px; }
    .hex:nth-child(12) { left: 49%; animation-duration: 24s; animation-delay: -20s; width: 30px; }
    .hex:nth-child(13) { left: 96%; animation-duration: 20s; animation-delay: -12s; width: 42px; }
    .hex:nth-child(14) { left: 26%; animation-duration: 33s; animation-delay: -24s; width: 24px; }

    @keyframes floatHex {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      6%   { opacity: 0.13; }
      88%  { opacity: 0.09; }
      100% { transform: translateY(-14vh) rotate(360deg); opacity: 0; }
    }

    /* ── Container principal (max-width 1120px) ─────────────────────────────── */
    .container {
      width: 100%; max-width: 1120px;
      position: relative; z-index: 1;
      animation: fadeDown 0.44s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Topbar ─────────────────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 2px 16px;
      animation: fadeDown 0.44s 0.04s ease both;
    }

    .topbar-left { display: flex; align-items: center; gap: 14px; }

    .header-icon {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(46,125,50,0.42), 0 1px 4px rgba(46,125,50,0.20);
    }

    .header-icon svg {
      width: 24px; height: 24px;
      fill: none; stroke: #fff;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .title {
      font-size: 22px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.5px;
      transition: color 0.3s;
    }

    .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; transition: color 0.3s; }

    .kbd {
      display: inline-flex; align-items: center;
      background: var(--kbd-bg); border: 1px solid var(--kbd-border); border-bottom-width: 2px;
      border-radius: 4px; padding: 1px 6px;
      font-size: 11px; font-family: monospace;
      color: var(--text-secondary); line-height: 1.6;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .theme-toggle {
      background: var(--toggle-bg); border: none; cursor: pointer;
      color: var(--toggle-color);
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }

    .theme-toggle:hover { transform: scale(1.08); }

    .theme-toggle svg {
      width: 20px; height: 20px; fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Card ───────────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 22px;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: fadeDown 0.44s 0.09s ease both;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    /* ── Hero banner ────────────────────────────────────────────────────────── */
    .hero {
      height: 76px;
      background: linear-gradient(105deg, #1b5e20 0%, #2e7d32 38%, #388e3c 68%, #43a047 100%);
      position: relative; overflow: hidden;
    }

    .hero-pattern {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0.15;
    }

    .hero-content {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      padding: 0 30px; gap: 13px;
    }

    .hero-content .hero-icon {
      width: 21px; height: 21px;
      stroke: rgba(255,255,255,0.88); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
    }

    .hero-text { color: rgba(255,255,255,0.92); }
    .hero-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
    .hero-sub   { font-size: 11.5px; opacity: 0.72; margin-top: 1px; }

    /* ── Área de busca ──────────────────────────────────────────────────────── */
    .search-area {
      padding: 24px 28px;
      border-bottom: 1px solid var(--divider);
      transition: border-color 0.3s;
    }

    .search-wrapper { position: relative; }

    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 19px; height: 19px; pointer-events: none;
      color: var(--text-muted); transition: color 0.3s;
    }

    .search-box {
      width: 100%; height: 56px;
      padding: 0 50px;
      font-size: 16px;
      border-radius: 14px;
      border: 1.5px solid var(--input-border);
      outline: none;
      background: var(--input-bg); color: var(--text-primary);
      transition: border-color 0.22s, box-shadow 0.22s, background 0.22s, color 0.22s;
    }

    .search-box::placeholder { color: var(--text-muted); }

    .search-box:focus {
      background: var(--card);
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 4px var(--input-focus-shadow);
    }

    .clear-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: var(--input-border); border: none; cursor: pointer;
      color: var(--text-muted);
      width: 26px; height: 26px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .clear-btn:hover { background: var(--item-hover-border); color: #fff; }
    .clear-btn.visible { display: flex; }

    /* ── Chips buscas recentes ──────────────────────────────────────────────── */
    .recents-wrap { margin-top: 14px; }

    .recents-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
      transition: color 0.3s;
    }

    .recents { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--chip-bg); border: 1px solid var(--chip-border);
      border-radius: 20px; padding: 4px 6px 4px 9px;
      font-size: 12px; color: var(--green-mid); line-height: 1;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .chip:hover { background: var(--item-bg); border-color: var(--item-hover-border); }
    .chip-icon  { flex-shrink: 0; opacity: 0.5; display: flex; }
    .chip-text  { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .chip-remove {
      background: none; border: none; cursor: pointer;
      color: var(--chip-border); padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; width: 18px; height: 18px;
      transition: color 0.15s, background 0.15s; flex-shrink: 0;
    }

    .chip-remove:hover { color: var(--green-mid); background: rgba(46,125,50,0.12); }

    /* ── Área de resultados ─────────────────────────────────────────────────── */
    .results-area { padding: 0 28px 28px; }

    /* ── Status bar ─────────────────────────────────────────────────────────── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      overflow: hidden;
      max-height: 0; opacity: 0; margin-bottom: 0;
      transition: max-height 0.22s ease, opacity 0.22s ease, margin-bottom 0.22s ease;
    }

    .status-bar.visible {
      max-height: 44px; opacity: 1; margin-bottom: 14px; margin-top: 18px;
    }

    .status-left { display: flex; align-items: center; gap: 10px; }

    .result-count { font-size: 12.5px; color: var(--text-muted); transition: color 0.3s; }
    .result-count strong { color: var(--green-light); font-weight: 600; }

    .loading { display: none; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-muted); }
    .loading.visible { display: flex; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid var(--input-border); border-top-color: var(--green-light);
      border-radius: 50%; animation: spin 0.65s linear infinite; flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Botões de vista (grade / lista) ────────────────────────────────────── */
    .view-toggles { display: flex; gap: 4px; }

    .view-btn {
      background: var(--toggle-bg); border: none; cursor: pointer;
      color: var(--text-muted);
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .view-btn svg {
      width: 15px; height: 15px; fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .view-btn.active { background: var(--green-mid); color: #fff; }
    .view-btn:not(.active):hover { background: var(--item-border); }

    /* ── Grid de resultados ─────────────────────────────────────────────────── */
    .items-list { display: grid; gap: 8px; }

    .items-list.view-grid { grid-template-columns: 1fr; }

    @media (min-width: 520px) {
      .items-list.view-grid { grid-template-columns: 1fr 1fr; }
    }

    .items-list.view-list { grid-template-columns: 1fr; }

    /* ── Item ───────────────────────────────────────────────────────────────── */
    .item {
      padding: 13px 16px;
      border-radius: 13px;
      background: var(--item-bg);
      border: 1.5px solid var(--item-border);
      display: flex; align-items: center; gap: 12px;
      min-width: 0;
      transition: border-color 0.17s, box-shadow 0.17s, transform 0.17s, background 0.3s;
      animation: slideIn 0.26s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .item:hover {
      border-color: var(--item-hover-border);
      box-shadow: 0 4px 16px var(--item-hover-shadow);
      transform: translateY(-2px);
    }

    .item-icon {
      width: 38px; height: 38px;
      background: var(--badge-bg); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .item-icon svg {
      width: 18px; height: 18px;
      stroke: var(--green-mid); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .item-info { flex: 1; min-width: 0; }

    .produto {
      font-size: 14px; font-weight: 500; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color 0.3s;
    }

    .produto mark {
      background: var(--mark-bg); color: var(--mark-color);
      border-radius: 2px; padding: 0 1px; font-weight: 700;
    }

    .caixa-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--badge-bg); color: var(--badge-color);
      border-radius: 6px; padding: 3px 8px;
      font-size: 11.5px; font-weight: 500; margin-top: 5px;
      transition: background 0.3s, color 0.3s;
    }

    .caixa-badge svg {
      width: 11px; height: 11px;
      stroke: var(--badge-color); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Estados visuais ────────────────────────────────────────────────────── */
    .state { text-align: center; }
    .state-hint  { padding: 50px 20px 58px; animation: fadeIn 0.3s ease both; }
    .state-empty { padding: 50px 20px 58px; animation: fadeIn 0.3s ease both; }
    .state-min   { padding: 28px 20px 36px; animation: fadeIn 0.3s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Cubo 3D girando (hint) ─────────────────────────────────────────────── */
    .cube-scene {
      width: 54px; height: 54px;
      perspective: 210px;
      margin: 0 auto 22px;
    }

    .cube {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: rotateCube 6s linear infinite;
    }

    @keyframes rotateCube {
      0%   { transform: rotateX(10deg)    rotateY(0deg); }
      100% { transform: rotateX(370deg)   rotateY(360deg); }
    }

    .cube-face {
      position: absolute;
      width: 54px; height: 54px;
      border: 2px solid var(--cube-border);
      background: var(--cube-face);
      border-radius: 4px;
    }

    .cube-face--front  { transform: translateZ(27px); }
    .cube-face--back   { transform: rotateY(180deg)  translateZ(27px); }
    .cube-face--left   { transform: rotateY(-90deg)  translateZ(27px); }
    .cube-face--right  { transform: rotateY(90deg)   translateZ(27px); }
    .cube-face--top    { transform: rotateX(90deg)   translateZ(27px); }
    .cube-face--bottom { transform: rotateX(-90deg)  translateZ(27px); }

    .state-icon {
      width: 62px; height: 62px; border-radius: 18px;
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .state-icon svg {
      fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .state-empty .state-icon { background: var(--state-empty-bg); }
    .state-empty .state-icon svg { width: 30px; height: 30px; stroke: var(--state-empty-stroke); }

    .state-min .state-icon  { background: var(--state-min-bg); }
    .state-min .state-icon svg  { width: 26px; height: 26px; stroke: var(--state-min-stroke); }

    .state-title {
      font-size: 15px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px;
      transition: color 0.3s;
    }

    .state-sub {
      font-size: 12.5px; color: var(--text-muted); line-height: 1.6; opacity: 0.75;
      transition: color 0.3s;
    }

    /* ── Erro ───────────────────────────────────────────────────────────────── */
    .error {
      margin-top: 20px; padding: 14px 16px;
      background: rgba(198,40,40,0.07); border: 1.5px solid rgba(198,40,40,0.25);
      border-radius: 12px; color: #ef5350;
      font-size: 13.5px; line-height: 1.4;
      display: flex; align-items: flex-start; gap: 10px;
    }

    .error-icon { flex-shrink: 0; margin-top: 1px; }
    .error-icon svg {
      width: 18px; height: 18px; stroke: #ef5350; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 460px) {
      .hero-sub { display: none; }
      .search-area { padding: 18px 20px; }
      .results-area { padding: 0 20px 20px; }
    }

    /* ── Toast "Copiado!" ───────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: #2e7d32; color: #fff;
      padding: 10px 18px; border-radius: 10px;
      font-size: 13.5px; font-weight: 600; letter-spacing: 0.1px;
      box-shadow: 0 4px 22px rgba(46,125,50,0.38);
      display: flex; align-items: center; gap: 8px;
      opacity: 0; transform: translateY(12px) scale(0.94);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }
    .toast svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .toast--visible { opacity: 1; transform: translateY(0) scale(1); }

    /* ── Item com foco de teclado ───────────────────────────────────────────── */
    .item { cursor: pointer; }
    .item--focused {
      border-color: var(--input-focus-border) !important;
      box-shadow: 0 0 0 3px var(--input-focus-shadow), 0 4px 16px var(--item-hover-shadow) !important;
      transform: translateY(-2px);
    }

    /* ── Recents header row ─────────────────────────────────────────────────── */
    .recents-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .recents-label { margin-bottom: 0; }
    .clear-all-btn {
      background: none; border: none; cursor: pointer;
      font-size: 10.5px; color: var(--text-muted);
      padding: 2px 7px; border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }
    .clear-all-btn:hover { color: var(--green-mid); background: var(--chip-bg); }

    /* ── Status bar: lado direito ───────────────────────────────────────────── */
    .status-right { display: flex; align-items: center; gap: 8px; }

    .export-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--toggle-bg); border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11.5px; font-weight: 500;
      padding: 0 11px; height: 32px; border-radius: 8px; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .export-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .export-btn:hover { background: var(--chip-bg); color: var(--green-mid); }

    /* ── View btn ativo com outline pulsante ────────────────────────────────── */
    @keyframes pulseOutline {
      0%   { box-shadow: 0 0 0 0   rgba(46,125,50,0.7); }
      65%  { box-shadow: 0 0 0 5px rgba(46,125,50,0); }
      100% { box-shadow: 0 0 0 0   rgba(46,125,50,0); }
    }
    [data-theme="dark"] .view-btn.active { animation: pulseOutlineDark 1.9s ease infinite; }
    @keyframes pulseOutlineDark {
      0%   { box-shadow: 0 0 0 0   rgba(102,187,106,0.7); }
      65%  { box-shadow: 0 0 0 5px rgba(102,187,106,0); }
      100% { box-shadow: 0 0 0 0   rgba(102,187,106,0); }
    }
    .view-btn.active { animation: pulseOutline 1.9s ease infinite; }

    /* ── Primeiro foco no campo de busca ────────────────────────────────────── */
    @keyframes searchFirstFocus {
      0%   { box-shadow: 0 0 0 0   rgba(67,160,71,0.55); }
      40%  { box-shadow: 0 0 0 9px rgba(67,160,71,0.18); }
      100% { box-shadow: 0 0 0 4px var(--input-focus-shadow); }
    }
    .search-box--first-focus {
      animation: searchFirstFocus 0.75s ease forwards;
    }

    /* ── Transição fade+scale ao trocar de view ─────────────────────────────── */
    .items-list--leaving {
      opacity: 0 !important;
      transform: scale(0.97) !important;
      transition: opacity 0.17s ease, transform 0.17s ease !important;
    }
    .items-list--entering {
      animation: itemsEnter 0.22s ease both;
    }
    @keyframes itemsEnter {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <!-- Hexágonos flutuantes no fundo -->
  <div class="bg-particles" aria-hidden="true">
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--hex-stroke)" stroke-width="5"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--hex-stroke)" stroke-width="4"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="var(--hex-stroke)" stroke="none" opacity="0.35"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--green-base)" stroke-width="5"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--hex-stroke)" stroke-width="3"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="var(--green-base)" stroke="none" opacity="0.28"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--green-light)" stroke-width="5"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--hex-stroke)" stroke-width="4"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="var(--hex-stroke)" stroke="none" opacity="0.22"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--green-base)" stroke-width="4"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--green-light)" stroke-width="3"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--hex-stroke)" stroke-width="5"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="var(--green-light)" stroke="none" opacity="0.20"/></svg></div>
    <div class="hex"><svg viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg"><polygon points="50,2 95,27 95,88 50,113 5,88 5,27" fill="none" stroke="var(--green-base)" stroke-width="6"/></svg></div>
  </div>

  <div class="container">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="header-icon">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/>
            <line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
        </div>
        <div>
          <div class="title">Busca de Inventário</div>
          <div class="subtitle">
            <span class="kbd">+</span> combinar termos
            &nbsp;·&nbsp;<span class="kbd">/</span> focar
            &nbsp;·&nbsp; mín. 2 caracteres
          </div>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema"></button>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Hero banner com padrão SVG de hexágonos -->
      <div class="hero">
        <svg class="hero-pattern" viewBox="0 0 1120 76" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="herogeo" x="0" y="0" width="60" height="69" patternUnits="userSpaceOnUse">
              <polygon points="30,2 56,16 56,53 30,67 4,53 4,16" fill="none" stroke="#fff" stroke-width="1.3"/>
              <line x1="30" y1="2"  x2="30" y2="67" stroke="#fff" stroke-width="0.5"/>
              <line x1="4"  y1="34" x2="56" y2="34" stroke="#fff" stroke-width="0.5"/>
              <polygon points="30,10 50,34 30,58 10,34" fill="none" stroke="#fff" stroke-width="0.7"/>
            </pattern>
          </defs>
          <rect width="1120" height="76" fill="url(#herogeo)"/>
        </svg>
        <div class="hero-content">
          <svg class="hero-icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <div class="hero-text">
            <div class="hero-title">Busca de Inventário</div>
            <div class="hero-sub">Localize produtos por nome, código ou combinação de termos</div>
          </div>
        </div>
      </div>

      <!-- Área de busca -->
      <div class="search-area">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>

          <input
            id="search"
            class="search-box"
            type="text"
            placeholder="Ex: mirra + roll on"
            autocomplete="off"
            spellcheck="false"
            autofocus
          >

          <button class="clear-btn" id="clearBtn" title="Limpar" aria-label="Limpar busca">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="3" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div id="recentsWrap" style="display:none">
          <div class="recents-wrap">
            <div class="recents-header">
              <div class="recents-label">Buscas recentes</div>
              <button class="clear-all-btn" id="clearAllBtn" type="button">Limpar tudo</button>
            </div>
            <div class="recents" id="recents"></div>
          </div>
        </div>
      </div>

      <!-- Área de resultados -->
      <div class="results-area">

        <div class="status-bar" id="statusBar">
          <div class="status-left">
            <div class="result-count" id="resultCount"></div>
            <div class="loading" id="loading">
              <div class="spinner"></div>
              Buscando…
            </div>
          </div>
          <div class="status-right">
            <button class="export-btn" id="exportBtn" title="Copiar todos os resultados">
              <svg viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Exportar
            </button>
            <div class="view-toggles">
              <button class="view-btn" id="btnGrid" title="Vista em grade" aria-label="Grade">
                <svg viewBox="0 0 24 24">
                  <rect x="3" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="3" width="7" height="7" rx="1"/>
                  <rect x="3" y="14" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
              </button>
              <button class="view-btn" id="btnList" title="Vista em lista" aria-label="Lista">
                <svg viewBox="0 0 24 24">
                  <line x1="8" y1="6"  x2="21" y2="6"/>
                  <line x1="8" y1="12" x2="21" y2="12"/>
                  <line x1="8" y1="18" x2="21" y2="18"/>
                  <line x1="3" y1="6"  x2="3.01" y2="6"/>
                  <line x1="3" y1="12" x2="3.01" y2="12"/>
                  <line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div id="results"></div>

      </div>
    </div>
  </div>

  <!-- Toast de feedback -->
  <div id="toast" class="toast" role="status" aria-live="polite">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toastMsg">Copiado!</span>
  </div>

  <script>
    /* ──────────────────────────────────────────────────────────────────────────
       TEMA (dark / light)
    ────────────────────────────────────────────────────────────────────────── */
    var currentTheme = localStorage.getItem("inv_theme") || "light";
    applyTheme(currentTheme);

    document.getElementById("themeToggle").addEventListener("click", function () {
      currentTheme = currentTheme === "light" ? "dark" : "light";
      localStorage.setItem("inv_theme", currentTheme);
      applyTheme(currentTheme);
    });

    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      var btn = document.getElementById("themeToggle");
      if (t === "dark") {
        btn.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<circle cx="12" cy="12" r="5"/>' +
            '<line x1="12" y1="1"  x2="12" y2="3"/>' +
            '<line x1="12" y1="21" x2="12" y2="23"/>' +
            '<line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>' +
            '<line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>' +
            '<line x1="1"  y1="12" x2="3"  y2="12"/>' +
            '<line x1="21" y1="12" x2="23" y2="12"/>' +
            '<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>' +
            '<line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>' +
          '</svg>';
        btn.title = "Modo claro";
      } else {
        btn.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' +
          '</svg>';
        btn.title = "Modo escuro";
      }
    }

    /* ──────────────────────────────────────────────────────────────────────────
       VISTA (grade / lista)
    ────────────────────────────────────────────────────────────────────────── */
    var currentView = localStorage.getItem("inv_view") || "grid";
    applyView(currentView);

    document.getElementById("btnGrid").addEventListener("click", function () { applyView("grid"); });
    document.getElementById("btnList").addEventListener("click", function () { applyView("list"); });

    function applyView(v) {
      currentView = v;
      localStorage.setItem("inv_view", v);
      document.getElementById("btnGrid").classList.toggle("active", v === "grid");
      document.getElementById("btnList").classList.toggle("active", v === "list");
      var list = document.querySelector(".items-list");
      if (list) {
        list.classList.add("items-list--leaving");
        setTimeout(function () {
          list.classList.remove("items-list--leaving", "view-grid", "view-list");
          list.classList.add("view-" + v, "items-list--entering");
          setTimeout(function () { list.classList.remove("items-list--entering"); }, 220);
        }, 170);
      }
    }

    /* ──────────────────────────────────────────────────────────────────────────
       VARIÁVEIS
    ────────────────────────────────────────────────────────────────────────── */
    var RECENTS_KEY   = "inv_recents";
    var MAX_RECENTS   = 6;
    var debounceTimer = null;
    var searchStartTime = 0;
    var lastResults   = [];
    var focusedIdx    = -1;
    var searchFocusedOnce = false;
    var toastTimer    = null;

    var searchInput = document.getElementById("search");
    var clearBtn    = document.getElementById("clearBtn");
    var resultsEl   = document.getElementById("results");
    var loadingEl   = document.getElementById("loading");
    var countEl     = document.getElementById("resultCount");
    var statusBar   = document.getElementById("statusBar");
    var recentsEl   = document.getElementById("recents");
    var recentsWrap = document.getElementById("recentsWrap");

    document.getElementById("exportBtn").addEventListener("click", exportResults);
    document.getElementById("clearAllBtn").addEventListener("click", clearAllRecents);

    /* Primeiro foco no campo */
    searchInput.addEventListener("focus", function () {
      if (!searchFocusedOnce) {
        searchFocusedOnce = true;
        searchInput.classList.add("search-box--first-focus");
        setTimeout(function () { searchInput.classList.remove("search-box--first-focus"); }, 800);
      }
    });

    /* ──────────────────────────────────────────────────────────────────────────
       ATALHOS DE TECLADO
    ────────────────────────────────────────────────────────────────────────── */
    document.addEventListener("keydown", function (e) {
      if (e.key === "/" && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
      if (e.key === "Escape" && document.activeElement === searchInput) {
        searchInput.blur();
        focusedIdx = -1;
        clearItemFocus();
      }

      /* Navegação por setas ↑↓ nos itens */
      var items = document.querySelectorAll(".items-list .item");
      if (!items.length) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
        setItemFocus(items, focusedIdx);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        focusedIdx = Math.max(focusedIdx - 1, 0);
        setItemFocus(items, focusedIdx);
      } else if (e.key === "Enter" && focusedIdx >= 0 && document.activeElement !== searchInput) {
        e.preventDefault();
        var focused = items[focusedIdx];
        if (focused) copyText(focused.dataset.produto);
      }
    });

    /* ──────────────────────────────────────────────────────────────────────────
       EVENTOS DO CAMPO
    ────────────────────────────────────────────────────────────────────────── */
    searchInput.addEventListener("input", onInput);
    clearBtn.addEventListener("click", clearSearch);

    function onInput() {
      var termo = searchInput.value;
      clearBtn.classList.toggle("visible", termo.length > 0);
      clearTimeout(debounceTimer);
      if (!termo.trim())           { showHint();     return; }
      if (termo.trim().length < 2) { showMinChars(); return; }
      debounceTimer = setTimeout(function () { buscar(termo); }, 300);
    }

    function clearSearch() {
      searchInput.value = "";
      clearBtn.classList.remove("visible");
      showHint();
      searchInput.focus();
    }

    /* ──────────────────────────────────────────────────────────────────────────
       STATUS BAR
    ────────────────────────────────────────────────────────────────────────── */
    function showStatusBar() { statusBar.classList.add("visible"); }

    function hideStatusBar() {
      statusBar.classList.remove("visible");
      countEl.innerHTML = "";
    }

    /* ──────────────────────────────────────────────────────────────────────────
       BUSCAS RECENTES
    ────────────────────────────────────────────────────────────────────────── */
    function getRecents() {
      try { return JSON.parse(localStorage.getItem(RECENTS_KEY)) || []; }
      catch (e) { return []; }
    }

    function saveRecent(termo) {
      var t = termo.trim();
      if (!t || t.length < 2) return;
      var recents = getRecents().filter(function (r) { return r !== t; });
      recents.unshift(t);
      recents = recents.slice(0, MAX_RECENTS);
      localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
      renderRecents();
    }

    function removeRecent(termo) {
      var recents = getRecents().filter(function (r) { return r !== termo; });
      localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
      renderRecents();
    }

    function clearAllRecents() {
      localStorage.removeItem(RECENTS_KEY);
      renderRecents();
    }

    function renderRecents() {
      var recents = getRecents();
      recentsEl.innerHTML = "";

      if (!recents.length) { recentsWrap.style.display = "none"; return; }
      recentsWrap.style.display = "block";

      recents.forEach(function (r) {
        var chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";

        var iconEl = document.createElement("span");
        iconEl.className = "chip-icon";
        iconEl.innerHTML =
          '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
              'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
            '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' +
          '</svg>';

        var textEl = document.createElement("span");
        textEl.className = "chip-text";
        textEl.textContent = r;

        var removeBtn = document.createElement("button");
        removeBtn.className = "chip-remove";
        removeBtn.type = "button";
        removeBtn.setAttribute("aria-label", "Remover busca");
        removeBtn.innerHTML =
          '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
              'stroke-width="3.5" stroke-linecap="round">' +
            '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>' +
          '</svg>';

        removeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          removeRecent(r);
        });

        chip.addEventListener("click", function () {
          searchInput.value = r;
          clearBtn.classList.add("visible");
          buscar(r);
        });

        chip.appendChild(iconEl);
        chip.appendChild(textEl);
        chip.appendChild(removeBtn);
        recentsEl.appendChild(chip);
      });
    }

    /* ──────────────────────────────────────────────────────────────────────────
       CHAMADA À API
    ────────────────────────────────────────────────────────────────────────── */
    function buscar(termo) {
      setLoading(true);
      showStatusBar();
      resultsEl.innerHTML = "";
      focusedIdx = -1;
      searchStartTime = Date.now();
      google.script.run
        .withSuccessHandler(function (data) { render(data, termo); })
        .withFailureHandler(onError)
        .buscarProdutosWeb(termo);
    }

    /* ──────────────────────────────────────────────────────────────────────────
       RENDERIZAÇÃO
    ────────────────────────────────────────────────────────────────────────── */
    function render(data, termo) {
      setLoading(false);
      resultsEl.innerHTML = "";
      focusedIdx = -1;

      if (!data || data.length === 0) {
        lastResults = [];
        hideStatusBar();
        resultsEl.appendChild(buildState("empty"));
        return;
      }

      lastResults = data;
      saveRecent(termo);

      var elapsed = Date.now() - searchStartTime;
      var total = data.length;
      countEl.innerHTML =
        "<strong>" + total + "</strong> produto" + (total !== 1 ? "s" : "") +
        " encontrado" + (total !== 1 ? "s" : "") +
        " <span style='opacity:0.5;font-size:11px'>(" + elapsed + " ms)</span>";
      showStatusBar();

      var palavras = termo.toLowerCase()
        .split("+").map(function (p) { return p.trim(); }).filter(Boolean);

      var list = document.createElement("div");
      list.className = "items-list view-" + currentView;

      var fragment = document.createDocumentFragment();

      data.forEach(function (item, i) {
        var div = document.createElement("div");
        div.className = "item";
        div.style.animationDelay = (i * 38) + "ms";
        div.dataset.produto = item.produto;
        div.title = "Clique para copiar";
        div.addEventListener("click", function () { copyText(item.produto); });

        var iconWrap = document.createElement("div");
        iconWrap.className = "item-icon";
        iconWrap.innerHTML =
          '<svg viewBox="0 0 24 24">' +
            '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8' +
                    'a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>' +
            '<polyline points="3.27 6.96 12 12.01 20.73 6.96"/>' +
            '<line x1="12" y1="22.08" x2="12" y2="12"/>' +
          '</svg>';

        var info = document.createElement("div");
        info.className = "item-info";

        var nome = document.createElement("div");
        nome.className = "produto";
        nome.innerHTML = highlight(item.produto, palavras);

        var badge = document.createElement("div");
        badge.className = "caixa-badge";
        badge.innerHTML =
          '<svg viewBox="0 0 24 24">' +
            '<rect x="1" y="3" width="15" height="13"/>' +
            '<polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>' +
            '<circle cx="5.5" cy="18.5" r="2.5"/>' +
            '<circle cx="18.5" cy="18.5" r="2.5"/>' +
          '</svg>';
        badge.appendChild(document.createTextNode(item.caixa));

        info.appendChild(nome);
        info.appendChild(badge);
        div.appendChild(iconWrap);
        div.appendChild(info);
        fragment.appendChild(div);
      });

      list.appendChild(fragment);
      resultsEl.appendChild(list);
    }

    /* ──────────────────────────────────────────────────────────────────────────
       HIGHLIGHT
    ────────────────────────────────────────────────────────────────────────── */
    function highlight(text, palavras) {
      var safe = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      palavras.forEach(function (p) {
        if (!p) return;
        var re = new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
        safe = safe.replace(re, function (m) { return "<mark>" + m + "</mark>"; });
      });
      return safe;
    }

    /* ──────────────────────────────────────────────────────────────────────────
       ERRO
    ────────────────────────────────────────────────────────────────────────── */
    function onError(err) {
      setLoading(false);
      hideStatusBar();
      resultsEl.innerHTML = "";

      var errDiv = document.createElement("div");
      errDiv.className = "error";

      var iconWrap = document.createElement("div");
      iconWrap.className = "error-icon";
      iconWrap.innerHTML =
        '<svg viewBox="0 0 24 24">' +
          '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3' +
                  'L13.71 3.86a2 2 0 0 0-3.42 0z"/>' +
          '<line x1="12" y1="9" x2="12" y2="13"/>' +
          '<line x1="12" y1="17" x2="12.01" y2="17"/>' +
        '</svg>';

      var msg = document.createElement("span");
      msg.textContent = "Erro ao buscar. Verifique sua conexão e tente novamente.";

      errDiv.appendChild(iconWrap);
      errDiv.appendChild(msg);
      resultsEl.appendChild(errDiv);
    }

    /* ──────────────────────────────────────────────────────────────────────────
       AUXILIARES
    ────────────────────────────────────────────────────────────────────────── */
    function setLoading(on) { loadingEl.classList.toggle("visible", on); }

    function showHint() {
      hideStatusBar();
      resultsEl.innerHTML = "";
      resultsEl.appendChild(buildState("hint"));
    }

    function showMinChars() {
      hideStatusBar();
      resultsEl.innerHTML = "";
      resultsEl.appendChild(buildState("min"));
    }

    function buildState(type) {
      var wrap = document.createElement("div");
      wrap.className = "state";

      if (type === "hint") {
        wrap.classList.add("state-hint");
        wrap.innerHTML =
          /* Cubo 3D girando */
          '<div class="cube-scene">' +
            '<div class="cube">' +
              '<div class="cube-face cube-face--front"></div>' +
              '<div class="cube-face cube-face--back"></div>' +
              '<div class="cube-face cube-face--left"></div>' +
              '<div class="cube-face cube-face--right"></div>' +
              '<div class="cube-face cube-face--top"></div>' +
              '<div class="cube-face cube-face--bottom"></div>' +
            '</div>' +
          '</div>' +
          '<div class="state-title">Busca de Inventário</div>' +
          '<div class="state-sub">Digite o nome do produto para localizar</div>';

      } else if (type === "empty") {
        wrap.classList.add("state-empty");
        wrap.innerHTML =
          '<div class="state-icon">' +
            '<svg viewBox="0 0 24 24">' +
              '<circle cx="11" cy="11" r="8"/>' +
              '<line x1="21" y1="21" x2="16.65" y2="16.65"/>' +
              '<line x1="8" y1="11" x2="14" y2="11"/>' +
            '</svg>' +
          '</div>' +
          '<div class="state-title">Nenhum produto encontrado</div>' +
          '<div class="state-sub">Tente outros termos ou verifique a grafia</div>';

      } else {
        wrap.classList.add("state-min");
        wrap.innerHTML =
          '<div class="state-icon">' +
            '<svg viewBox="0 0 24 24">' +
              '<circle cx="11" cy="11" r="8"/>' +
              '<line x1="21" y1="21" x2="16.65" y2="16.65"/>' +
            '</svg>' +
          '</div>' +
          '<div class="state-title">Digite ao menos 2 caracteres</div>';
      }

      return wrap;
    }

    /* ──────────────────────────────────────────────────────────────────────────
       CLIPBOARD / TOAST
    ────────────────────────────────────────────────────────────────────────── */
    function copyText(text, msg) {
      var label = msg || "Copiado!";
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { showToast(label); });
      } else {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); showToast(label); } catch (e) {}
        document.body.removeChild(ta);
      }
    }

    function showToast(msg) {
      var toast = document.getElementById("toast");
      document.getElementById("toastMsg").textContent = msg;
      toast.classList.add("toast--visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toast.classList.remove("toast--visible"); }, 2000);
    }

    /* ──────────────────────────────────────────────────────────────────────────
       EXPORTAR
    ────────────────────────────────────────────────────────────────────────── */
    function exportResults() {
      if (!lastResults.length) return;
      var text = lastResults.map(function (r) { return r.produto + " — " + r.caixa; }).join("\n");
      copyText(text, "Exportado!");
    }

    /* ──────────────────────────────────────────────────────────────────────────
       NAVEGAÇÃO POR TECLADO
    ────────────────────────────────────────────────────────────────────────── */
    function setItemFocus(items, idx) {
      items.forEach(function (el, i) {
        el.classList.toggle("item--focused", i === idx);
      });
      if (items[idx]) {
        items[idx].scrollIntoView({ block: "nearest", behavior: "smooth" });
      }
    }

    function clearItemFocus() {
      document.querySelectorAll(".items-list .item").forEach(function (el) {
        el.classList.remove("item--focused");
      });
    }

    /* ──────────────────────────────────────────────────────────────────────────
       INIT
    ────────────────────────────────────────────────────────────────────────── */
    renderRecents();
    showHint();
  </script>
</body>
</html>
