<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 80px;
    }

    .container {
      width: 700px;
    }

    /* 🔍 Search */
    .search-box {
      width: 100%;
      padding: 18px 20px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      outline: none;
      transition: all 0.2s ease;
      background: #f9f9f9;
    }

    .search-box:focus {
      border-color: #2e7d32;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
    }

    /* 📦 Results */
    .results {
      margin-top: 30px;
    }

    .item {
      padding: 16px 18px;
      margin-bottom: 12px;
      border-radius: 10px;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      transition: all 0.2s ease;
    }

    .item:hover {
      background: #f1f8f4;
      border-color: #a5d6a7;
      transform: translateY(-1px);
    }

    .produto {
      font-size: 16px;
      font-weight: 500;
      color: #2e7d32;
      margin-bottom: 4px;
    }

    .caixa {
      font-size: 13px;
      color: #777;
    }

    /* vazio */
    .empty {
      padding: 20px;
      text-align: center;
      color: #777;
      border: 1px dashed #e0e0e0;
      border-radius: 10px;
      background: #fafafa;
    }

    /* título opcional */
    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #2e7d32;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="title">Busca de Inventário</div>

    <input 
      id="search"
      class="search-box"
      placeholder="Ex: mirra + roll on"
      onkeyup="buscar()"
    >

    <div id="results" class="results"></div>

  </div>

  <script>
    let timeout = null;

    function buscar() {
      clearTimeout(timeout);

      timeout = setTimeout(() => {
        const termo = document.getElementById("search").value;

        if (!termo) {
          document.getElementById("results").innerHTML = "";
          return;
        }

        google.script.run
          .withSuccessHandler(render)
          .buscarProdutosWeb(termo);
      }, 300);
    }

    function render(data) {
      const container = document.getElementById("results");
      container.innerHTML = "";

      if (!data.length) {
        container.innerHTML = "<div class='empty'>Nenhum produto encontrado</div>";
        return;
      }

      data.forEach(item => {
        container.innerHTML += `
          <div class="item">
            <div class="produto">${item.produto}</div>
            <div class="caixa">📦 ${item.caixa}</div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
