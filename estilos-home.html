<style>
/* ═══════════════════════════════════════════════════
   HOME PAGE — HUD SCI-FI
   ═══════════════════════════════════════════════════ */
.home-page {
  background: var(--bg);
  color: var(--text-primary);
  align-items: stretch;
  position: relative;
  overflow: hidden;
  min-height: 100vh;
}

.home-page::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,230,118,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,230,118,0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

.home-particles {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* ── Scan line ───────────────────────────────────── */
.home-scan {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(0,230,118,0) 10%,
    rgba(0,230,118,0.7) 50%,
    rgba(0,230,118,0) 90%,
    transparent 100%);
  pointer-events: none; z-index: 2;
  animation: homeScanLine 12s linear infinite;
  top: 0; opacity: 0;
}
.home-page.active .home-scan { opacity: 1; }
@keyframes homeScanLine {
  0%   { top: 0%;   opacity: 0; }
  3%   { opacity: 1; }
  97%  { opacity: 0.4; }
  100% { top: 100%; opacity: 0; }
}

/* ── Cantos HUD ──────────────────────────────────── */
.hud-corner { position: absolute; pointer-events: none; z-index: 3; }
.hud-tl { top: 12px; left: 12px; }
.hud-tr { top: 12px; right: 12px; }
.hud-bl { bottom: 64px; left: 12px; }
.hud-br { bottom: 64px; right: 12px; }

/* ── Header da Home ──────────────────────────────── */
.home-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 40px;
  background: var(--header-bg);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  gap: 16px;
}

.home-logo { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.home-logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #1b5e20, #43a047);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(0,230,118,0.25), 0 2px 8px rgba(0,0,0,0.4);
  flex-shrink: 0;
}
.home-logo-name { font-size: 15px; font-weight: 700; color: #e2f0e4; letter-spacing: -0.3px; }
.home-logo-tag  { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #00e676; margin-top: 1px; }

.system-status {
  display: flex; align-items: center; gap: 7px;
  background: rgba(0,230,118,0.08);
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 20px; padding: 5px 14px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: #00e676;
  flex-shrink: 0;
}
.system-status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00e676; box-shadow: 0 0 8px #00e676;
  animation: blink 2.2s ease infinite; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.home-header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }

.home-page .icon-btn {
  border-color: rgba(0,230,118,0.2);
  color: rgba(0,230,118,0.65);
}
.home-page .icon-btn:hover {
  background: rgba(0,230,118,0.1);
  border-color: rgba(0,230,118,0.5);
  color: #00e676;
}

/* ── Hero ─────────────────────────────────────────── */
.home-hero {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center;
  padding: 40px 40px 32px;
  position: relative; z-index: 1;
}

.home-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 48px;
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.home-content-col {
  display: flex; flex-direction: column; align-items: flex-start;
}

/* ── Badge de status ─────────────────────────────── */
.home-hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(0,200,83,0.1);
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 20px; padding: 5px 16px;
  font-size: 10.5px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: #00e676;
  margin-bottom: 20px;
  font-family: var(--font-mono);
  animation: fadeSlideIn 0.5s ease both;
}
.home-hero-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00e676; box-shadow: 0 0 8px #00e676;
  animation: blink 2s ease infinite; flex-shrink: 0;
}
@keyframes fadeSlideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

/* ── Título ──────────────────────────────────────── */
.home-title {
  font-size: clamp(30px, 4.5vw, 52px); font-weight: 800;
  color: #e2f0e4; letter-spacing: -1.5px; line-height: 1.1;
  margin-bottom: 16px;
  animation: fadeSlideIn 0.5s ease 0.08s both;
}
.home-title span {
  background: linear-gradient(135deg, #43ea7a 0%, #00e676 60%, #00ff88 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.home-subtitle {
  font-size: clamp(13px, 1.6vw, 15.5px);
  color: rgba(140,190,150,0.8);
  line-height: 1.7; max-width: 460px;
  margin: 0 0 30px;
  animation: fadeSlideIn 0.5s ease 0.16s both;
}

/* ── Stats strip ─────────────────────────────────── */
.hero-stats {
  display: flex; align-items: stretch;
  background: rgba(0,230,118,0.05);
  border: 1px solid rgba(0,230,118,0.2);
  border-radius: var(--radius-md);
  overflow: hidden; margin: 0 0 32px;
  max-width: 420px; width: 100%;
  animation: fadeSlideIn 0.5s ease 0.22s both;
}
.hero-stat { flex: 1; text-align: center; padding: 14px 10px; }
.hero-stat-value {
  font-family: var(--font-mono); font-size: 17px; font-weight: 700;
  color: #00e676; letter-spacing: 0.5px; line-height: 1;
}
.hero-stat-value.clock-val { font-size: 15px; letter-spacing: 2px; }
.hero-stat-label {
  font-size: 8px; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: rgba(0,230,118,0.4); margin-top: 5px;
}
.hero-stat-divider {
  width: 1px; background: rgba(0,230,118,0.15);
  flex-shrink: 0; margin: 8px 0;
}

/* ── Grid de cards ───────────────────────────────── */
.home-nav-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px; width: 100%; max-width: 560px;
  animation: fadeSlideIn 0.5s ease 0.3s both;
}

.home-page .nav-card {
  background: rgba(0,20,8,0.75);
  border-color: rgba(0,200,83,0.15);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.home-page .nav-card:hover {
  background: rgba(0,28,11,0.9);
  border-color: rgba(0,230,118,0.4);
  box-shadow: 0 0 24px rgba(0,230,118,0.15), 0 4px 20px rgba(0,0,0,0.5);
}
.home-page .nav-card-num { color: rgba(0,230,118,0.22); }
.home-page .nav-card:hover .nav-card-num { color: rgba(0,230,118,0.6); }
.home-page .nav-card-title { color: #e2f0e4; }
.home-page .nav-card-desc  { color: rgba(140,190,150,0.65); }
.home-page .nav-card-label { color: rgba(0,230,118,0.6); }
.home-page .nav-card-icon  { background: rgba(0,200,83,0.1); }
.home-page .nav-card-icon svg { stroke: rgba(0,230,118,0.8); }
.home-page .nav-card:hover .nav-card-icon svg { stroke: #fff; }
.home-page .nav-card-arrow { background: rgba(0,200,83,0.1); border-color: rgba(0,230,118,0.15); }
.home-page .nav-card-arrow svg { stroke: rgba(0,230,118,0.65); }
.home-page .nav-card:hover .nav-card-arrow { background: #1a6b30; border-color: #1a6b30; transform: translateX(4px); }
.home-page .nav-card.disabled { background: rgba(0,15,6,0.5); border-color: rgba(0,200,83,0.07); }
.home-page .badge-soon { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: rgba(200,220,205,0.5); }

/* ── Sistemas de anéis (coluna direita legado) ───── */
.home-ring-col {
  display: flex; align-items: center; justify-content: center;
  position: relative; animation: fadeSlideIn 0.6s ease 0.2s both;
}
.ring-col-wrapper {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.energy-ring-system {
  width: 320px; height: 320px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ring {
  position: absolute; border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.ring.r1 { width: 310px; height: 310px; border: 1px dashed rgba(0,230,118,0.12); animation: ringRotate 50s linear infinite; }
.ring.r2 { width: 264px; height: 264px; border: 1px solid rgba(0,230,118,0.22); animation: ringRotate 30s linear infinite reverse; }
.ring.r2::before, .ring.r2::after { content: ''; position: absolute; width: 7px; height: 7px; background: #00e676; border-radius: 50%; box-shadow: 0 0 10px #00e676, 0 0 22px rgba(0,230,118,0.5); }
.ring.r2::before { top: -3.5px; left: 50%; transform: translateX(-50%); }
.ring.r2::after  { bottom: -3.5px; left: 50%; transform: translateX(-50%); }
.ring.r3 { width: 200px; height: 200px; border: 1px dashed rgba(0,230,118,0.3); animation: ringRotate 20s linear infinite; }
.ring.r4 { width: 148px; height: 148px; border: 1.5px solid rgba(0,230,118,0.42); animation: ringRotate 14s linear infinite reverse; }
.ring.r4::before, .ring.r4::after { content: ''; position: absolute; width: 5px; height: 5px; background: #00e676; border-radius: 50%; box-shadow: 0 0 8px #00e676; }
.ring.r4::before { top: -2.5px; left: 50%; transform: translateX(-50%); }
.ring.r4::after  { right: -2.5px; top: 50%; transform: translateY(-50%); }
@keyframes ringRotate {
  from { transform: translate(-50%,-50%) rotate(0deg); }
  to   { transform: translate(-50%,-50%) rotate(360deg); }
}
.ring-orb { position: absolute; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%); background: none; }
.ro1 { width: 140px; height: 140px; animation: ringRotate 24s linear infinite; }
.ro1::after { content: ''; position: absolute; width: 6px; height: 6px; background: #00e676; border-radius: 50%; top: -3px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 12px #00e676, 0 0 24px rgba(0,230,118,0.4); }
.ro2 { width: 232px; height: 232px; animation: ringRotate 38s linear infinite reverse; }
.ro2::after { content: ''; position: absolute; width: 5px; height: 5px; background: rgba(0,230,118,0.7); border-radius: 50%; top: -2.5px; right: 28%; box-shadow: 0 0 8px rgba(0,230,118,0.8); }
.ro3 { width: 286px; height: 286px; animation: ringRotate 55s linear infinite; }
.ro3::after { content: ''; position: absolute; width: 4px; height: 4px; background: rgba(0,230,118,0.5); border-radius: 50%; bottom: -2px; left: 38%; box-shadow: 0 0 6px rgba(0,230,118,0.6); }
.ring-core {
  position: relative; z-index: 2;
  width: 112px; height: 112px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,40,15,0.95) 0%, rgba(0,18,7,0.98) 100%);
  border: 1.5px solid rgba(0,230,118,0.42);
  box-shadow: 0 0 32px rgba(0,230,118,0.15), inset 0 0 22px rgba(0,230,118,0.06);
  display: flex; align-items: center; justify-content: center;
}
.ring-core-inner { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ring-core-clock { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: #00e676; letter-spacing: 2px; line-height: 1; }
.ring-core-label { font-family: var(--font-mono); font-size: 5.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(0,230,118,0.45); }
.hud-readout { position: absolute; display: flex; flex-direction: column; gap: 10px; top: 50%; transform: translateY(-50%); }
.hud-ro-left  { right: calc(100% + 14px); }
.hud-ro-right { left: calc(100% + 14px); }
.hud-ro-item  { display: flex; flex-direction: column; gap: 1px; }
.hud-ro-left .hud-ro-item  { align-items: flex-end; }
.hud-ro-right .hud-ro-item { align-items: flex-start; }
.hud-ro-label { font-family: var(--font-mono); font-size: 7.5px; font-weight: 700; letter-spacing: 1.5px; color: rgba(0,230,118,0.38); text-transform: uppercase; }
.hud-ro-value { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; letter-spacing: 1px; color: rgba(0,230,118,0.8); }

/* ── Footer da Home ──────────────────────────────── */
.home-footer {
  padding: 14px 40px; text-align: center;
  font-size: 11px; color: rgba(0,230,118,0.4);
  border-top: 1px solid rgba(0,230,118,0.1);
  display: flex; align-items: center; justify-content: center; gap: 12px;
  position: relative; z-index: 1;
  font-family: var(--font-mono); letter-spacing: 0.5px;
  background: rgba(4,14,7,0.6);
}
.home-footer-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(0,230,118,0.3); flex-shrink: 0; }
.home-footer-version {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2);
  border-radius: 8px; padding: 1px 7px;
  font-size: 9px; font-weight: 700; color: rgba(0,230,118,0.7); letter-spacing: 1px;
}

/* ── Nav card (base) ─────────────────────────────── */
.nav-card {
  background: rgba(255,255,255,0.65);
  border: 1px solid var(--green-border-soft);
  border-radius: var(--radius-lg);
  padding: 22px 22px 58px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  position: relative; overflow: hidden;
  backdrop-filter: blur(14px);
  box-shadow: var(--shadow-card);
  user-select: none;
}
[data-theme="dark"] .nav-card { background: rgba(0,20,8,0.7); border-color: rgba(0,200,83,0.12); }
.nav-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1.5px; background: linear-gradient(90deg, transparent 0%, var(--green-400) 50%, transparent 100%); opacity: 0; transition: opacity 0.2s; }
.nav-card:hover::before { opacity: 1; }
.nav-card::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 90% 70% at 50% 0%, rgba(0,230,118,0.07), transparent 70%); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.nav-card:hover::after { opacity: 1; }
.nav-card:hover { border-color: var(--green-border); box-shadow: var(--shadow-green), var(--shadow-md); transform: translateY(-5px); }
[data-theme="dark"] .nav-card:hover { border-color: rgba(0,230,118,0.35); background: rgba(0,25,10,0.8); }
.nav-card:active { transform: translateY(-2px) scale(0.99); }
.nav-card.disabled { opacity: 0.45; cursor: default; pointer-events: none; }
.nav-card-scan { position: absolute; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--green-neon), transparent); top: -1px; pointer-events: none; opacity: 0; }
.nav-card:hover .nav-card-scan { animation: cardScanDown 0.55s ease forwards; }
@keyframes cardScanDown { 0%{top:0%;opacity:0} 10%{opacity:0.9} 90%{opacity:0.4} 100%{top:100%;opacity:0} }
.nav-card-status { position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 5px; font-size: 8.5px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; font-family: var(--font-mono); }
.nav-card-status.online { color: var(--green-neon); }
.nav-card.disabled .nav-card-status { color: var(--text-muted); }
.nav-card-status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green-neon); box-shadow: 0 0 6px var(--green-neon); animation: blink 2.2s ease infinite; flex-shrink: 0; }
.nav-card.disabled .nav-card-status-dot { background: var(--text-muted); box-shadow: none; animation: none; }
.nav-card-num { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--green-border); text-transform: uppercase; margin-bottom: 14px; transition: color 0.2s; }
.nav-card:hover .nav-card-num { color: var(--green-400); }
.nav-card-icon { width: 48px; height: 48px; background: var(--green-100); border-radius: 13px; display: flex; align-items: center; justify-content: center; margin-bottom: 18px; transition: all 0.2s; }
[data-theme="dark"] .nav-card-icon { background: rgba(0,200,83,0.1); }
.nav-card:hover .nav-card-icon { background: linear-gradient(135deg, var(--green-800), var(--green-500)); box-shadow: var(--shadow-green); }
.nav-card-icon svg { transition: stroke 0.2s; stroke: var(--green-700); }
.nav-card:hover .nav-card-icon svg { stroke: #fff; }
[data-theme="dark"] .nav-card-icon svg { stroke: var(--green-400); }
[data-theme="dark"] .nav-card:hover .nav-card-icon svg { stroke: #fff; }
.nav-card-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--green-500); margin-bottom: 5px; }
.nav-card-title { font-size: 19px; font-weight: 700; color: var(--text-primary); margin-bottom: 7px; letter-spacing: -0.3px; line-height: 1.2; }
.nav-card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.6; }
.nav-card-arrow { position: absolute; bottom: 22px; right: 22px; width: 32px; height: 32px; border-radius: 50%; background: var(--green-100); border: 1px solid var(--green-border-soft); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
[data-theme="dark"] .nav-card-arrow { background: rgba(0,200,83,0.1); }
.nav-card:hover .nav-card-arrow { background: var(--green-700); border-color: var(--green-700); transform: translateX(4px); }
.nav-card-arrow svg { stroke: var(--green-600); transition: stroke 0.2s; }
.nav-card:hover .nav-card-arrow svg { stroke: #fff; }
.badge-soon { display: inline-flex; align-items: center; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 10px; padding: 2px 8px; font-size: 9px; font-weight: 600; color: var(--gray-500); margin-left: 6px; vertical-align: middle; font-family: var(--font-mono); letter-spacing: 0.5px; }
[data-theme="dark"] .badge-soon { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: var(--text-muted); }

/* ─── DARK/LIGHT HOME OVERRIDES ─────────────────── */
[data-theme="dark"] .home-page {
  background: linear-gradient(135deg, #071a0b 0%, #04120a 50%, #030a05 100%);
  color: #e2f0e4;
}
[data-theme="light"] .home-page::before { display: none; }
[data-theme="light"] .home-scan         { display: none; }
[data-theme="light"] #homeParticles     { display: none; }
[data-theme="light"] .hud-corner        { display: none; }

[data-theme="light"] #page-home {
  background: radial-gradient(ellipse 90% 55% at 50% 90%, rgba(46,125,50,0.07) 0%, var(--bg) 65%);
}
[data-theme="light"] .home-header { background: var(--header-bg); border-bottom-color: var(--border); }
[data-theme="light"] .home-logo-name { color: var(--text); }
[data-theme="light"] .home-logo-tag  { color: var(--green); }
[data-theme="light"] .home-hero-badge { background: rgba(46,125,50,0.06); border-color: var(--border-hi); color: var(--green); }
[data-theme="light"] .home-hero-badge-dot { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
[data-theme="light"] .home-title { color: var(--text); }
[data-theme="light"] .home-title span { background: linear-gradient(135deg, var(--green-bright) 0%, var(--green) 100%); -webkit-background-clip: text; background-clip: text; }
[data-theme="light"] .home-subtitle { color: var(--text-dim); }
[data-theme="light"] .hero-stats { background: rgba(46,125,50,0.05); border-color: var(--border); }
[data-theme="light"] .hero-stat-value    { color: var(--green); }
[data-theme="light"] .hero-stat-label    { color: var(--text-dim); }
[data-theme="light"] .hero-stat-divider  { background: var(--border); }
[data-theme="light"] .system-status { background: rgba(46,125,50,0.06); border-color: var(--border-hi); color: var(--green); }
[data-theme="light"] .system-status-dot { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
[data-theme="light"] .home-page .icon-btn { border-color: var(--border-hi); color: var(--green); }
[data-theme="light"] .home-page .icon-btn:hover { background: rgba(46,125,50,0.1); border-color: var(--green); color: var(--green-bright); }
[data-theme="light"] .home-page .nav-card { background: rgba(255,255,255,0.9); border-color: var(--card-border); box-shadow: 0 2px 8px var(--shadow); }
[data-theme="light"] .home-page .nav-card:hover { background: #ffffff; border-color: var(--border-hi); box-shadow: 0 0 24px var(--green-glow), 0 4px 20px var(--shadow); }
[data-theme="light"] .home-page .nav-card-title  { color: var(--text); }
[data-theme="light"] .home-page .nav-card-desc   { color: var(--text-dim); }
[data-theme="light"] .home-page .nav-card-label  { color: var(--green); }
