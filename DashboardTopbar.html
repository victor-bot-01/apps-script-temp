<div class="topbar">
  <div class="topbar-left">
    <div class="brand-mark"></div>
    <div>
      <div class="title">ERP Dashboard</div>
      <div class="subtitle">
        <span id="lastUpdate">Atualizando dados...</span>
        <span class="subtitle-pill" id="lastUpdateRelative">sincronizando...</span>
        <span class="subtitle-pill" id="filtersActiveBadge">0 filtros ativos</span>
        <span class="subtitle-pill" id="cacheBadge">cache vazio</span>
      </div>
    </div>
  </div>

  <div class="top-actions">
    <button class="btn btn-secondary" id="tvModeBtn" onclick="toggleTvMode()">Modo TV</button>
    <label class="top-toggle">
      <input type="checkbox" id="autoRefreshToggle" checked onchange="toggleAutoRefresh()">
      Autoatualização
    </label>
    <button class="btn" id="refreshBtn" onclick="loadDashboard(true)">Atualizar</button>
  </div>
</div>
