<div id="page-inventario" class="page active">
  <div class="card">
    <div class="hero" aria-hidden="true">
      <svg class="hero-pattern" viewBox="0 0 1000 76" preserveAspectRatio="xMidYMid slice">
        <defs><pattern id="hpat" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="1.5" fill="white"/></pattern></defs>
        <rect width="1000" height="76" fill="url(#hpat)"/>
      </svg>
      <div class="hero-content">
        <svg class="hero-icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <div class="hero-text">
          <div class="hero-title">Inventário de Produtos</div>
          <div class="hero-sub" id="heroSub">Pesquise pelo nome ou código do produto</div>
        </div>
        <div class="header-icon-wrap" style="margin-left:auto">
          <div class="header-icon" id="headerIcon">
            <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          </div>
          <span class="result-badge" id="resultBadge"></span>
        </div>
      </div>
    </div>

    <div class="search-area">
      <div class="search-wrapper">
        <svg class="search-icon" id="searchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="ghost-suggestion" id="ghostSuggestion" aria-hidden="true"></span>
        <input
          class="search-box" id="searchBox"
          type="search"
          placeholder="Ex: mirra + roll on"
          autocomplete="off" autocorrect="off" spellcheck="false"
          aria-label="Campo de busca"
        >
        <button class="clear-btn" id="clearBtn" aria-label="Limpar">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="ghost-hint" id="ghostHint"></div>
      <div class="term-pills-wrap" id="termPillsWrap">
        <div class="term-pills-inner" id="termPills"></div>
      </div>
      <div class="recents-wrap" id="recentsWrap" style="display:none">
        <div class="recents-header">
          <span class="recents-label">Recentes</span>
          <button class="clear-all-btn" id="clearAllBtn">Limpar tudo</button>
        </div>
        <div class="recents" id="recentsList"></div>
      </div>
    </div>

    <div class="results-area">
      <div class="toolbar" id="toolbar">
        <div class="toolbar-left">
          <span class="loading" id="loadingIndicator"><span class="spinner"></span> Buscando…</span>
          <span class="result-count" id="resultCount"></span>
          <span class="resp-time" id="respTime"></span>
        </div>
        <div class="toolbar-right">
          <select class="toolbar-sort" id="sortSelect">
            <option value="default">Padrão</option>
            <option value="name-az">Nome A→Z</option>
            <option value="name-za">Nome Z→A</option>
            <option value="box-az">Caixa A→Z</option>
          </select>
          <div class="view-toggles">
            <button class="view-btn" id="viewList" title="Lista">
              <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
            </button>
            <button class="view-btn" id="viewGrid" title="Grade">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            </button>
            <button class="view-btn" id="viewGroup" title="Agrupar">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="5" rx="1"/><rect x="3" y="17" width="18" height="5" rx="1"/></svg>
            </button>
          </div>
          <button class="small-btn" id="shareBtn">
            <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="2"/><circle cx="6" cy="12" r="2"/><circle cx="18" cy="19" r="2"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Compartilhar
          </button>
          <button class="small-btn" id="exportBtn">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV
          </button>
          <button class="small-btn" id="printBtn">
            <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Imprimir
          </button>
        </div>
      </div>
      <div id="content"></div>
    </div>
  </div>
</div>
