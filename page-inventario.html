<div id="page-inventario" class="page">

  <!-- Header interno -->
  <header class="page-header">
    <button class="back-btn" id="backFromInventario" aria-label="Voltar para Home">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Home
    </button>
    <div>
      <div class="page-title">Inventário</div>
      <div class="page-subtitle">Busca de produtos no estoque</div>
    </div>
    <div class="page-header-right">
      <span class="session-stats" id="sessionStats"></span>
      <button class="icon-btn" id="emailReportBtn"
              aria-label="Enviar relatório por e-mail"
              title="Relatório por e-mail">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </button>
      <button class="icon-btn theme-btn" aria-label="Alternar tema" title="Alternar tema (Ctrl+D)">
        <svg class="theme-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn shortcuts-btn" aria-label="Atalhos de teclado" title="Atalhos (?)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="page-content">
    <div class="main-card">

      <!-- Busca -->
      <div class="search-area">
        <div class="search-wrapper">
          <svg class="search-icon" id="searchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="ghost-suggestion" id="ghostSuggestion" aria-hidden="true"></span>
          <input
            class="search-box" id="searchBox"
            type="search"
            placeholder="Ex: mirra + roll on"
            autocomplete="off" autocorrect="off" spellcheck="false"
            aria-label="Campo de busca"
          >
          <button class="clear-btn" id="clearBtn" aria-label="Limpar busca">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="ghost-hint" id="ghostHint"></div>
        <div class="term-pills-wrap" id="termPillsWrap">
          <div class="term-pills-inner" id="termPills"></div>
        </div>
        <div class="recents-wrap" id="recentsWrap" style="display:none">
          <div class="recents-header">
            <span class="recents-label">Recentes</span>
            <button class="clear-all-btn" id="clearAllBtn">Limpar tudo</button>
          </div>
          <div class="recents" id="recentsList"></div>
        </div>
      </div>

      <!-- Resultados -->
      <div class="results-area">
        <div class="toolbar" id="toolbar">
          <div class="toolbar-left">
            <span class="loading" id="loadingIndicator">
              <span class="spinner"></span> Buscando…
            </span>
            <span class="result-count" id="resultCount"></span>
            <span class="resp-time" id="respTime"></span>
          </div>
          <div class="toolbar-right">
            <select class="toolbar-sort" id="sortSelect">
              <option value="default">Padrão</option>
              <option value="name-az">Nome A→Z</option>
              <option value="name-za">Nome Z→A</option>
              <option value="box-az">Caixa A→Z</option>
            </select>
            <div class="view-toggles">
              <button class="view-btn" id="viewList" title="Lista">
                <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
              </button>
              <button class="view-btn" id="viewGrid" title="Grade">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </button>
              <button class="view-btn" id="viewGroup" title="Agrupar por caixa">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="5" rx="1"/><rect x="3" y="17" width="18" height="5" rx="1"/></svg>
              </button>
            </div>
            <button class="small-btn" id="shareBtn" title="Compartilhar URL">
              <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="2"/><circle cx="6" cy="12" r="2"/><circle cx="18" cy="19" r="2"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Compartilhar
            </button>
            <button class="small-btn" id="exportBtn" title="Exportar CSV (Ctrl+E)">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              CSV
            </button>
            <button class="small-btn" id="printBtn" title="Imprimir">
              <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              Imprimir
            </button>
          </div>
        </div>
        <div id="content"></div>
      </div>

    </div>
  </div>

  <!-- Email drawer -->
  <div class="email-overlay" id="emailOverlay"
       role="dialog" aria-modal="true"
       aria-label="Enviar relatório por e-mail"
       style="display:none">
    <div class="email-drawer">
      <div class="email-drawer-hdr">
        <div>
          <div class="email-drawer-title">Relatório de Inativos</div>
          <div class="email-drawer-sub">Lista todos os produtos marcados como inativos</div>
        </div>
        <button class="icon-btn email-drawer-close-btn"
                id="emailDrawerClose" aria-label="Fechar">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="email-drawer-body">
        <label class="email-field-lbl" for="reportEmailInput">E-mail de destino</label>
        <input class="email-field-inp" id="reportEmailInput"
               type="email" placeholder="seu@email.com"
               autocomplete="email">
      </div>
      <div class="email-drawer-footer">
        <button class="email-send-btn" id="emailSendBtn">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Enviar relatório
        </button>
      </div>
    </div>
  </div>
</div>
